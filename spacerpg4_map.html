<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceRPG4 星图工具</title>
<style>
  :root {
    --bg: #0a0e17; --panel-bg: #111827; --border: #1e293b;
    --text: #cbd5e1; --text-dim: #64748b; --text-bright: #f1f5f9;
    --accent: #3b82f6; --accent-hover: #2563eb; --danger: #ef4444;
    --success: #10b981; --warning: #f59e0b; --radius: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg); color: var(--text); height: 100vh;
    display: flex; flex-direction: column; overflow: hidden; user-select: none;
  }
  #toolbar { display:flex; align-items:center; gap:8px; padding:10px 16px; background:var(--panel-bg); border-bottom:1px solid var(--border); z-index:10; flex-shrink:0; }
  #toolbar .title { font-size:16px; font-weight:700; color:var(--text-bright); margin-right:16px; letter-spacing:0.5px; }
  #toolbar .title span { color:var(--accent); }
  .mode-group { display:flex; background:var(--bg); border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); }
  .mode-btn { padding:7px 16px; border:none; background:transparent; color:var(--text-dim); cursor:pointer; font-size:13px; font-weight:500; transition:all 0.15s; white-space:nowrap; }
  .mode-btn:first-child { border-right:1px solid var(--border); }
  .mode-btn.active { background:var(--accent); color:#fff; }
  .mode-btn:hover:not(.active) { color:var(--text); }
  .tb-sep { width:1px; height:24px; background:var(--border); margin:0 4px; }
  .tb-btn { padding:7px 14px; border:1px solid var(--border); background:var(--bg); color:var(--text); border-radius:var(--radius); cursor:pointer; font-size:13px; transition:all 0.15s; white-space:nowrap; }
  .tb-btn:hover { border-color:var(--accent); color:var(--text-bright); }
  .tb-btn.danger { border-color:var(--danger); color:var(--danger); }
  .tb-btn.danger:hover { background:var(--danger); color:#fff; }
  .tb-btn.small { padding:4px 10px; font-size:11px; }
  #main { display:flex; flex:1; min-height:0; }
  #panel { width:280px; background:var(--panel-bg); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
  #panel-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
  .panel-tab { flex:1; padding:10px 6px; border:none; background:transparent; color:var(--text-dim); cursor:pointer; font-size:12px; font-weight:500; text-align:center; border-bottom:2px solid transparent; }
  .panel-tab:hover { color:var(--text); }
  .panel-tab.active { color:var(--text-bright); border-bottom-color:var(--accent); }
  #panel-content { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:12px; }
  #panel-content::-webkit-scrollbar { width:4px; }
  #panel-content::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .panel-section { display:flex; flex-direction:column; gap:8px; }
  .panel-label { font-size:11px; font-weight:600; text-transform:uppercase; color:var(--text-dim); letter-spacing:0.5px; }
  .color-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
  .color-chip { display:flex; align-items:center; gap:6px; padding:6px 8px; border-radius:var(--radius); cursor:pointer; border:2px solid transparent; font-size:11px; color:var(--text); transition:all 0.15s; background:var(--bg); }
  .color-chip:hover { border-color:rgba(255,255,255,0.2); }
  .color-chip.selected { border-color:#fff; box-shadow:0 0 8px rgba(255,255,255,0.2); }
  .color-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; border:1px solid rgba(0,0,0,0.3); }
  .info-row { display:flex; gap:6px; align-items:center; }
  .info-row input, .info-row select { flex:1; padding:6px 8px; border:1px solid var(--border); background:var(--bg); color:var(--text-bright); border-radius:4px; font-size:12px; outline:none; }
  .info-row input:focus, .info-row select:focus { border-color:var(--accent); }
  .info-row select option { background:var(--panel-bg); color:var(--text); }
  .panel-hint { font-size:11px; color:var(--text-dim); line-height:1.5; }
  .panel-hint kbd { display:inline-block; padding:1px 5px; border:1px solid var(--border); border-radius:3px; background:var(--bg); font-size:10px; font-family:inherit; }
  .facility-row { display:flex; align-items:center; gap:8px; padding:6px 8px; background:var(--bg); border-radius:4px; cursor:pointer; transition:background 0.15s; font-size:12px; }
  .facility-row:hover { background:rgba(255,255,255,0.03); }
  .facility-row input[type=checkbox] { accent-color:var(--accent); cursor:pointer; }
  .facility-row.grayed { opacity:0.4; pointer-events:none; }
  .item-list { display:flex; flex-direction:column; gap:4px; margin-top:4px; }
  .item-chip { display:flex; align-items:center; gap:6px; padding:4px 8px; background:var(--bg); border-radius:4px; font-size:11px; }
  .item-chip span { flex:1; }
  .item-chip .rm-btn { cursor:pointer; color:var(--danger); font-weight:700; font-size:14px; padding:0 4px; }
  .item-chip .rm-btn:hover { color:#ff6666; }
  .global-item { display:flex; align-items:center; gap:6px; padding:6px 8px; background:var(--bg); border-radius:4px; font-size:11px; cursor:pointer; border:1px solid transparent; transition:all 0.15s; }
  .global-item:hover { border-color:var(--accent); }
  .global-item .gi-icon { font-size:14px; flex-shrink:0; }
  .global-item .gi-info { flex:1; min-width:0; }
  .global-item .gi-info .gi-name { font-weight:600; color:var(--text-bright); }
  .global-item .gi-info .gi-sub { color:var(--text-dim); font-size:10px; }
  .global-item .gi-del { color:var(--danger); cursor:pointer; font-size:13px; padding:2px 4px; display:none; }
  .global-item:hover .gi-del { display:block; }
  .global-item .gi-del:hover { color:#ff6666; }
  #canvas-wrap { flex:1; position:relative; cursor:grab; overflow:hidden; background:radial-gradient(circle at 50% 50%, rgba(30,64,175,0.08) 0%, transparent 70%), var(--bg); }
  #canvas-wrap.panning { cursor:grabbing; }
  #canvas-wrap.map-mode { cursor:crosshair; }
  #svg-root { width:100%; height:100%; }
  .grid-dot { fill:rgba(255,255,255,0.04); }
  .edge-line { stroke:rgba(255,255,255,0.25); stroke-width:2; stroke-linecap:round; transition:stroke 0.2s, stroke-width 0.2s; cursor:pointer; }
  .edge-line:hover { stroke:rgba(255,255,255,0.5); stroke-width:3; }
  .edge-line.path-highlight { stroke:#00ff88; stroke-width:4; filter:drop-shadow(0 0 6px rgba(0,255,136,0.5)); }
  .node-circle { stroke-width:2.5; cursor:pointer; transition:r 0.15s, stroke-width 0.15s; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
  .node-circle:hover { stroke-width:4; }
  .node-circle.selected { stroke:#fff; stroke-width:4; }
  .node-circle.path-node { stroke:#00ff88; stroke-width:5; filter:drop-shadow(0 0 10px rgba(0,255,136,0.6)); }
  .node-circle.start-node { stroke:#00ff88; stroke-width:5; }
  .node-circle.end-node { stroke:#ff4444; stroke-width:5; }
  .node-label { font-size:12px; fill:var(--text); text-anchor:middle; pointer-events:none; font-weight:500; paint-order:stroke; stroke:rgba(0,0,0,0.8); stroke-width:3px; stroke-linejoin:round; }
  .node-label.path-node { fill:#00ff88; font-weight:700; }
  .node-tag { font-size:14px; text-anchor:middle; pointer-events:none; font-weight:900; paint-order:stroke; stroke:rgba(0,0,0,0.8); stroke-width:3px; stroke-linejoin:round; }
  .tag-start { fill:#00ff88; } .tag-end { fill:#ff4444; }
  .fac-icon-text { font-size:11px; text-anchor:middle; pointer-events:none; }
  .fac-icon-text.active { opacity:1; }
  .fac-icon-text.inactive { opacity:0.2; }
  #status-bar { display:flex; align-items:center; gap:12px; padding:8px 16px; background:var(--panel-bg); border-top:1px solid var(--border); font-size:12px; color:var(--text-dim); flex-shrink:0; min-height:38px; }
  #status-bar .path-result { color:#00ff88; font-weight:600; }
  #status-bar .path-result strong { color:#fff; }
  #context-menu { position:fixed; background:var(--panel-bg); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:4px; z-index:100; display:none; min-width:140px; }
  .ctx-item { padding:8px 12px; font-size:13px; cursor:pointer; border-radius:4px; color:var(--text); transition:background 0.1s; }
  .ctx-item:hover { background:var(--accent); color:#fff; }
  .ctx-item.danger { color:var(--danger); }
  .ctx-item.danger:hover { background:var(--danger); color:#fff; }
  #tooltip { position:fixed; pointer-events:none; padding:10px 14px; background:rgba(0,0,0,0.9); color:#fff; font-size:12px; border-radius:6px; z-index:50; display:none; border:1px solid rgba(255,255,255,0.15); max-width:280px; line-height:1.6; }
  #tooltip .tt-name { font-size:14px; font-weight:700; margin-bottom:2px; }
  #tooltip .tt-fac { margin-top:4px; }
  #tooltip .tt-fac div { display:flex; align-items:flex-start; gap:4px; }
  #detail-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:80; display:none; justify-content:center; align-items:center; }
  #detail-panel { background:var(--panel-bg); border:1px solid var(--border); border-radius:12px; padding:24px; max-width:480px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:var(--shadow); }
  #detail-panel h2 { font-size:18px; color:var(--text-bright); margin-bottom:4px; }
  #detail-panel .dp-color { font-size:12px; color:var(--text-dim); margin-bottom:16px; }
  #detail-panel .dp-section { margin-bottom:14px; }
  #detail-panel .dp-section h3 { font-size:13px; color:var(--text-bright); margin-bottom:4px; }
  #detail-panel .dp-section p { font-size:12px; color:var(--text); line-height:1.6; }
  #detail-panel .dp-close { float:right; background:none; border:none; color:var(--text-dim); font-size:20px; cursor:pointer; padding:4px 8px; }
  #detail-panel .dp-close:hover { color:#fff; }
  #detail-panel::-webkit-scrollbar { width:4px; }
  #detail-panel::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  #legend { position:absolute; bottom:12px; left:12px; background:rgba(0,0,0,0.75); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px 14px; font-size:11px; color:var(--text-dim); pointer-events:none; z-index:5; line-height:1.8; }
  #legend2 { position:absolute; bottom:12px; right:56px; background:rgba(0,0,0,0.75); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:10px 14px; font-size:11px; color:var(--text-dim); pointer-events:none; z-index:5; line-height:1.8; }
  #legend .leg-item { display:flex; align-items:center; gap:6px; }
  #file-input { display:none; }
  #zoom-indicator { position:absolute; bottom:12px; right:16px; font-size:11px; color:var(--text-dim); background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:4px; pointer-events:none; }
  #news-log { position:absolute; bottom:140px; left:12px; z-index:20; max-width:350px; cursor:pointer; }
  #ark-btn { position:fixed; right:0; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.15); border-right:none; border-radius:8px 0 0 8px; color:rgba(255,255,255,0.7); padding:12px 8px; cursor:pointer; z-index:150; font-size:12px; writing-mode:vertical-rl; transition:all 0.3s; }
  #ark-btn:hover { background:rgba(59,130,246,0.3); color:#fff; transform:translateY(-50%) scale(1.05); border-color:var(--accent); }
  #chat-panel { position:fixed; top:0; right:-420px; width:400px; height:100vh; background:var(--panel-bg); border-left:1px solid var(--border); z-index:160; display:flex; flex-direction:column; transition:right 0.3s; box-shadow:-4px 0 20px rgba(0,0,0,0.5); }
  #chat-panel.open { right:0; }
  #chat-header { display:flex; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border); flex-shrink:0; }
  #chat-header .ch-title { flex:1; font-weight:700; color:var(--text-bright); font-size:14px; }
  #chat-header .ch-close { background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; padding:4px 8px; }
  #chat-header .ch-close:hover { color:#fff; }
  #chat-messages { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
  #chat-messages::-webkit-scrollbar { width:4px; }
  #chat-messages::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .chat-msg { max-width:90%; padding:8px 12px; border-radius:12px; font-size:12px; line-height:1.5; animation:fadeIn 0.2s; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }
  .chat-msg.user { align-self:flex-end; background:var(--accent); color:#fff; border-bottom-right-radius:4px; }
  .chat-msg.ai { align-self:flex-start; background:var(--bg); color:var(--text); border:1px solid var(--border); border-bottom-left-radius:4px; }
  .chat-msg.ai pre { font-size:10px; color:var(--text-dim); white-space:pre-wrap; margin:4px 0; }
  .chat-msg.ai code { background:rgba(0,0,0,0.3); padding:1px 4px; border-radius:3px; font-size:10px; }
  #chat-input-area { display:flex; gap:6px; padding:10px; border-top:1px solid var(--border); flex-shrink:0; }
  #chat-input { flex:1; padding:8px 12px; border:1px solid var(--border); background:var(--bg); color:var(--text-bright); border-radius:20px; font-size:12px; outline:none; }
  #chat-input:focus { border-color:var(--accent); }
  #chat-send { padding:8px 16px; border:none; background:var(--accent); color:#fff; border-radius:20px; cursor:pointer; font-size:12px; font-weight:600; }
  #chat-send:hover { background:var(--accent-hover); }
  #chat-loading { display:none; align-self:flex-start; padding:6px 12px; font-size:11px; color:var(--text-dim); }
  .news-entry { background:rgba(0,0,0,0.85); border-left:2px solid #ff8800; border-radius:0 4px 4px 0; padding:4px 10px; margin-top:3px; font-size:11px; color:#ddd; animation: newsFadeIn 0.4s ease; }
  @keyframes newsFadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  .news-entry .ne-time { color:#ff8800; font-size:10px; }
  .news-entry .ne-system { color:#fff; font-weight:600; }
  .news-entry .ne-items { color:#ccc; }
  #search-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:90; display:none; justify-content:center; align-items:flex-start; padding-top:60px; }
  #search-panel { background:var(--panel-bg); border:1px solid var(--border); border-radius:12px; width:520px; max-height:70vh; display:flex; flex-direction:column; box-shadow:var(--shadow); overflow:hidden; }
  #search-tabs { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; }
  .search-tab { flex:1; padding:10px 8px; border:none; background:transparent; color:var(--text-dim); cursor:pointer; font-size:12px; text-align:center; border-bottom:2px solid transparent; transition:all 0.15s; }
  .search-tab:hover { color:var(--text); }
  .search-tab.active { color:var(--text-bright); border-bottom-color:var(--accent); }
  #search-body { padding:16px; overflow-y:auto; flex:1; }
  #search-input { width:100%; padding:10px 12px; border:1px solid var(--border); background:var(--bg); color:var(--text-bright); border-radius:8px; font-size:13px; outline:none; margin-bottom:8px; }
  #search-input:focus { border-color:var(--accent); }
  .search-mode-row { display:flex; gap:8px; margin-bottom:10px; font-size:12px; align-items:center; }
  .search-mode-row label { cursor:pointer; display:flex; align-items:center; gap:4px; color:var(--text-dim); }
  .search-mode-row input[type=radio] { accent-color:var(--accent); }
  #search-results { display:flex; flex-direction:column; gap:4px; max-height:300px; overflow-y:auto; }
  #search-results::-webkit-scrollbar { width:4px; }
  #search-results::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
  .search-result { display:flex; align-items:center; gap:8px; padding:8px 10px; background:var(--bg); border-radius:6px; border:1px solid transparent; cursor:pointer; transition:all 0.15s; }
  .search-result:hover { border-color:var(--accent); }
  .search-result .sr-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .search-result .sr-name { flex:1; font-size:13px; color:var(--text-bright); font-weight:500; }
  .search-result .sr-info { font-size:11px; color:var(--text-dim); }
  .search-result .sr-acts { display:flex; gap:4px; flex-shrink:0; }
  .sr-btn { padding:3px 8px; border:1px solid var(--border); background:transparent; color:var(--text); border-radius:4px; cursor:pointer; font-size:10px; transition:all 0.15s; white-space:nowrap; }
  .sr-btn:hover { border-color:var(--accent); color:var(--text-bright); }
  .sr-btn.start:hover { border-color:#00ff88; color:#00ff88; }
  .sr-btn.end:hover { border-color:#ff4444; color:#ff4444; }
  .sr-btn.locate:hover { border-color:var(--warning); color:var(--warning); }
  #search-no-results { text-align:center; color:var(--text-dim); padding:16px; font-size:13px; }
  #search-close { position:absolute; top:12px; right:12px; background:none; border:none; color:var(--text-dim); font-size:22px; cursor:pointer; z-index:91; }
  #search-close:hover { color:#fff; }
</style>
</head>
<body>

<div id="toolbar">
  <div class="title">🚀 Space<span>RPG4</span> 星图</div>
  <div class="mode-group">
    <button class="mode-btn active" data-mode="editor" id="btn-editor">✏️ 编辑器模式</button>
    <button class="mode-btn" data-mode="map" id="btn-map">🗺️ 地图模式</button>
  </div>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-save">💾 保存</button>
  <button class="tb-btn" id="btn-export">📤 导出</button>
  <button class="tb-btn" id="btn-import">📥 导入</button>
  <input type="file" id="file-input" accept=".json">
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="var a=document.createElement('a');a.href='spacerpg4_map_init.json';a.download='spacerpg4_map_init.json';a.click()">📥 下载星图</button>
  <button class="tb-btn" id="btn-fit">🔍 适应画面</button>
  <button class="tb-btn" id="btn-search">🔎 搜索</button>
  <button class="tb-btn" id="btn-territory">🗺️ 领域</button>
  <button class="tb-btn" onclick="window.open('kb_config.html','_blank')">⚙️ 配置</button>
  <a href="setup.bat" download style="text-decoration:none;"><button class="tb-btn">📥 本地工具</button></a>
  <div class="tb-sep"></div>
  <button class="tb-btn danger" id="btn-clear">🗑 清空</button>
</div>

<div id="main">
  <div id="panel">
    <div id="panel-tabs">
      <button class="panel-tab active" data-tab="planet">🪐 星系</button>
      <button class="panel-tab" data-tab="ship">🚀 船只</button>
      <button class="panel-tab" data-tab="product">📦 产品</button>
    </div>
    <div id="panel-content"></div>
  </div>
  <div id="canvas-wrap">
    <svg id="svg-root"></svg>
    <div id="zoom-indicator">100%</div>
    <div id="legend">
      <div class="leg-item">🍺 酒吧</div><div class="leg-item">📋 任务中心</div>
      <div class="leg-item">🚀 船坞</div><div class="leg-item">🔧 装备中心</div>
      <div class="leg-item">💰 贸易中心</div><div class="leg-item">🏛️ 舰队管理</div>
    </div>
    <div id="legend2">
      <div class="leg-item">🔴 涨 🟢 跌 — 平</div>
      <div id="legend2-products"></div>
    </div>
  </div>
</div>

<div id="status-bar">
  <span id="status-text">就绪</span>
  <span id="status-path" class="path-result" style="display:none;"></span>
</div>

<div id="context-menu"><div class="ctx-item danger" data-action="delete-edge">🗑 删除通道</div></div>
<div id="tooltip"></div>
<div id="detail-overlay"><div id="detail-panel"></div></div>
<div id="news-log"></div>

<!-- Arkitect AI Chat -->
<div id="ark-btn" onclick="toggleChat()">遇事不决？<br>问问Arkitect</div>
<div id="chat-panel">
  <div id="chat-header">
    <span class="ch-title">🤖 Arkitect AI</span>
    <button class="ch-close" onclick="toggleChat()">✕</button>
  </div>
  <div id="chat-messages">
    <div class="chat-msg ai">你好！我是Arkitect，SpaceRPG4的AI助手。我可以帮你查找星系、行星、NPC、船只、贸易信息，以及规划路径。试试问我吧！</div>
  </div>
  <div id="chat-loading">思考中...</div>
  <div id="chat-input-area">
    <input type="text" id="chat-input" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')sendChat()">
    <button id="chat-send" onclick="sendChat()">发送</button>
  </div>
</div>
<div id="search-overlay">
  <button id="search-close">✕</button>

const factionColorCache = {};
function getFactionColor(factionName) {
  if (!factionName) return null;
  if (factionColorCache[factionName]) return factionColorCache[factionName];
  let hash = 0;
  for (let i = 0; i < factionName.length; i++) hash = factionName.charCodeAt(i) + ((hash << 5) - hash);
  const h = Math.abs(hash) % 360;
  const s = 55 + (Math.abs(hash) % 20);
  const l = 45 + (Math.abs(hash >> 8) % 15);
  factionColorCache[factionName] = `hsl(${h},${s}%,${l}%)`;
  return factionColorCache[factionName];
}

let nextId = 1, planetNextId = 1;
function genId(prefix='n') {

function getNeighbors(nodeId) {

}

function defaultPlanetFacilities() {

function getPlanets(node) { if(isGray(node)||!node.planets) return []; return node.planets; }

function hasAnyFacility(node) {

  }

}

function isFacilityActive(node, key) {
  for (const p of getPlanets(node)) {
    const f = p.facilities; if(!f) continue;
    switch(key) {

      case 'mission': if(f.mission) return true; break;
      case 'shipyard': if(f.shipyard?.active) return true; break;
      case 'equipment': if(f.equipment) return true; break;
      case 'trade': if(f.trade?.active) return true; break;
      case 'fleet': if(f.fleet) return true; break;

}

function migrateNode(node) {
  if(node.colorIndex===undefined) node.colorIndex=0;

  if(node.facilities&&!node.planets){node.planets=[{id:genPlanetId(),name:node.name||'默认行星',facilities:node.facilities}];delete node.facilities;}
  if(!node.planets) node.planets=isGray(node)?null:[];
  if(isGray(node)) node.planets=null;
  else if(node.planets){for(const p of node.planets) ensurePlanetFacilities(p);}
}

function ensurePlanetFacilities(planet) {
  if(!planet.facilities) planet.facilities=defaultPlanetFacilities();
  const f=planet.facilities;
  if(!f.bar||!Array.isArray(f.bar.npcs)) f.bar={active:!!(f.bar?.active),npcs:Array.isArray(f.bar?.npcs)?f.bar.npcs:[]};
  if(f.mission===undefined) f.mission=false;
  if(!f.shipyard||!Array.isArray(f.shipyard.shipIds)) f.shipyard={active:!!(f.shipyard?.active),shipIds:Array.isArray(f.shipyard?.shipIds)?f.shipyard.shipIds:[]};
  if(f.equipment===undefined) f.equipment=false;
  if(!f.trade||!Array.isArray(f.trade.products)){if(f.trade&&Array.isArray(f.trade.products)&&f.trade.products.length>0&&typeof f.trade.products[0]==='string'){f.trade.products=f.trade.products.map(pid=>({productId:pid,priceMin:0,priceMax:0,trend:0}));}else{f.trade={active:!!(f.trade?.active),products:[]};}}
  if(f.trade&&Array.isArray(f.trade.products)){for(const item of f.trade.products){if(item.trend===undefined) item.trend=0;if(item.priceMin===undefined){item.priceMin=item.price||0;item.priceMax=item.price||0;delete item.price;}}}
  if(f.fleet===undefined) f.fleet=false;
}

function defaultShipAttrs() {

}
function migrateShip(ship) { const def=defaultShipAttrs(); for(const key of Object.keys(def)){if(ship[key]===undefined) ship[key]=def[key];} }

function migrateAllData() {

function bfs(startId,endId) {
  if(startId===endId) return [startId];
  const queue=[startId],visited=new Set([startId]),parent={};
  while(queue.length>0){const cur=queue.shift();if(cur===endId) break;for(const nb of getNeighbors(cur)){
    // 跳过障碍节点（起点和终点除外）
    if(state.blockedNodeIds.includes(nb) && nb!==startId && nb!==endId) continue;
    if(!visited.has(nb)){visited.add(nb);parent[nb]=cur;queue.push(nb);}
  }}
  if(parent[endId]===undefined&&startId!==endId) return null;
  const path=[];let node=endId;while(node!==undefined){path.unshift(node);node=parent[node];}
  return path[0]===startId?path:null;
}

function isRefuelNode(node) {
  // Blue (0) and Red (2) provide fuel
  return node && (node.colorIndex === 0 || node.colorIndex === 2);
}

// Compute max consecutive non-refuel nodes along a path (skip start node — fleet departs with full fuel)
function maxConsecutiveNoRefuel(path) {
  let maxStreak = 0, curStreak = 0;
  for (let i = 0; i < path.length; i++) {
    if (i === 0) continue; // skip start node: fleet starts with full fuel
    const node = getNodeById(path[i]);
    if (isRefuelNode(node)) { curStreak = 0; }
    else { curStreak++; maxStreak = Math.max(maxStreak, curStreak); }
  }
  return maxStreak;
}

// Distance from node to nearest refuel node (BFS)
function distToNearestRefuel(nodeId) {
  if (isRefuelNode(getNodeById(nodeId))) return 0;
  const visited = new Set([nodeId]);
  const queue = [{ id: nodeId, dist: 0 }];
  while (queue.length > 0) {
    const cur = queue.shift();
    const node = getNodeById(cur.id);
    if (node && isRefuelNode(node) && cur.dist > 0) return cur.dist;
    for (const nbId of getNeighbors(cur.id)) {
      if (!visited.has(nbId)) { visited.add(nbId); queue.push({ id: nbId, dist: cur.dist + 1 }); }
    }
  }
  return Infinity;
}

function validateRefuelPath(path, startId, endId, ftl) {
  if (ftl <= 0) return { valid: true };
  const startNode = getNodeById(startId);
  const endNode = getNodeById(endId);

  // Rule: nearest refuel from start must be <= FTL
  const startDist = distToNearestRefuel(startId);
  if (startDist > ftl) return { valid: false, reason: `起点${startNode?.name}到最近补给需${startDist}跳，超过FTL(${ftl})` };

  const endIsRefuel = isRefuelNode(endNode);

  if (!endIsRefuel) {
    // End is non-refuel: Jl = distance from last refuel (or start) to end, excluding start
    let Jl = 0;
    for (let i = path.length - 1; i >= 1; i--) { // skip i=0 (start node: fleet departs with full fuel)
      const node = getNodeById(path[i]);
      if (isRefuelNode(node)) break;
      Jl++;
    }
    // Path before last segment must have maxStreak <= FTL
    const restPath = path.slice(0, path.length - Jl);
    const restMaxStreak = maxConsecutiveNoRefuel(restPath.length > 0 ? restPath : [path[0]]);
    if (restMaxStreak > ftl) return { valid: false, reason: `路径中段最长无补给${restMaxStreak}跳>FTL(${ftl})` };
    // Js = nearest refuel to end (anywhere on map)
    const Js = distToNearestRefuel(endId);
    if (Js < Jl) {
      // Closer refuel exists elsewhere: one-way to end then go to that refuel
      if (Js + Jl <= ftl) return { valid: true };
      return { valid: false, reason: `终点${endNode?.name}无补给，Jl=${Jl} Js=${Js}，Js+Jl=${Js+Jl}>FTL(${ftl})` };
    } else {
      // Last refuel is nearest: round trip
      if (Jl * 2 <= ftl) return { valid: true };
      return { valid: false, reason: `终点${endNode?.name}无补给，Jl=${Jl} Js=${Js}，2×Jl=${Jl*2}>FTL(${ftl})` };
    }
  } else {
    // End is refuel: longest streak in whole path <= FTL
    const maxStreak = maxConsecutiveNoRefuel(path);
    if (maxStreak <= ftl) return { valid: true };
    return { valid: false, reason: `最长无补给段${maxStreak}跳>FTL(${ftl})` };
  }
}

function computePath() {
  if(!state.startNodeId||!state.endNodeId){state.pathNodeIds=[];state.pathEdgeIds=[];return;}
  const order=[state.startNodeId,...state.waypointIds,state.endNodeId];
  const fullPath=[];
  for(let i=0;i<order.length-1;i++){const seg=bfs(order[i],order[i+1]);if(!seg){state.pathNodeIds=[];state.pathEdgeIds=[];return;}if(i>0) seg.shift();fullPath.push(...seg);}
  state.pathNodeIds=fullPath;state.pathEdgeIds=[];
  for(let i=0;i<fullPath.length-1;i++) state.pathEdgeIds.push(edgeKey(fullPath[i],fullPath[i+1]));

}

function updatePathDisplay() {

    const names=state.pathNodeIds.map(id=>getNodeById(id)?.name||'?');

    statusPath.style.display='inline';
    // Check FTL validation
    if (state.pathMode==='norefuel' && state.ftlRange>0) {
      const val = validateRefuelPath(state.pathNodeIds, state.startNodeId, state.endNodeId, state.ftlRange);
      if (!val.valid) {
