    statusPath.innerHTML=`${modeLabel}: <strong>${names.join(' → ')}</strong> | 距离: <strong>${names.length-1}</strong> 跳`;
  }
  else if(state.startNodeId&&state.endNodeId){statusPath.style.display='inline';statusPath.style.color='#ff4444';const wpMsg=state.waypointIds.length>0?'（含途径点）':'';statusPath.innerHTML='⚠️ <strong>无法到达</strong> — 路径不通'+wpMsg;}
  else{statusPath.style.display='none';}
}

function fuzzyScore(query,target){const q=query.toLowerCase().trim(),t=target.toLowerCase();if(!q) return 0;if(t===q) return -3;if(t.startsWith(q)) return -2;if(t.includes(q)) return -1;let qi=0,dist=0,firstMatch=-1;for(let i=0;i<t.length&&qi<q.length;i++){if(t[i]===q[qi]){if(firstMatch<0) firstMatch=i;qi++;}else dist++;}if(qi===q.length) return dist+firstMatch*0.1;return 999;}
function searchNodes(query,onlyPlanets=false){const results=[];for(const node of state.nodes){if(onlyPlanets&&isGray(node)) continue;const score=fuzzyScore(query,node.name);if(score<999) results.push({node,score});}results.sort((a,b)=>a.score-b.score);return results.slice(0,15);}

// ---- Delaunay Triangulation (Bowyer-Watson) ----
function delaunayTriangulation(points) {
  if (points.length < 3) return [];
  // Super-triangle that contains all points
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const p of points){if(p.x<minX)minX=p.x;if(p.y<minY)minY=p.y;if(p.x>maxX)maxX=p.x;if(p.y>maxY)maxY=p.y;}
  const dx=maxX-minX,dy=maxY-minY,dm=Math.max(dx,dy)*10;
  const midX=(minX+maxX)/2,midY=(minY+maxY)/2;
  const s1={x:midX,y:midY-dm},s2={x:midX-dm,y:midY+dm},s3={x:midX+dm,y:midY+dm};
  let triangles=[{a:s1,b:s2,c:s3}];

  for(const p of points){
    const bad=[];
    for(const t of triangles){
      if(pointInCircumcircle(p,t.a,t.b,t.c)) bad.push(t);
    }
    const edges=[];
    for(const t of bad){
      addEdgeIfUnique(edges,t.a,t.b);addEdgeIfUnique(edges,t.b,t.c);addEdgeIfUnique(edges,t.c,t.a);
    }
    triangles=triangles.filter(t=>!bad.includes(t));
    for(const e of edges) triangles.push({a:e[0],b:e[1],c:p});
  }
  // Remove triangles using super-triangle vertices
  return triangles.filter(t=>{
    const verts=[t.a,t.b,t.c];
    return !verts.some(v=>v===s1||v===s2||v===s3);
  });
}

function pointInCircumcircle(p,a,b,c){
  const ax=a.x,ay=a.y,bx=b.x,by=b.y,cx=c.x,cy=c.y;
  const d=2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
  if(Math.abs(d)<1e-10) return false;
  const ux=((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/d;
  const uy=((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/d;
  const r2=(ax-ux)*(ax-ux)+(ay-uy)*(ay-uy);
  const dist2=(p.x-ux)*(p.x-ux)+(p.y-uy)*(p.y-uy);
  return dist2<r2-1e-8;
}

function addEdgeIfUnique(edges,p1,p2){
  for(let i=edges.length-1;i>=0;i--){
    const e=edges[i];
    if((e[0]===p1&&e[1]===p2)||(e[0]===p2&&e[1]===p1)){edges.splice(i,1);return;}
  }
  edges.push([p1,p2]);
}

// ---- Territory Rendering (Delaunay) ----
// Compute circumcenter of triangle abc
function circumcenter(a,b,c){
  const d=2*(a.x*(b.y-c.y)+b.x*(c.y-a.y)+c.x*(a.y-b.y));
  if(Math.abs(d)<1e-10) return null;
  const ax=a.x,ay=a.y,bx=b.x,by=b.y,cx=c.x,cy=c.y;
  const ux=((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/d;
  const uy=((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/d;
  return {x:ux,y:uy};
}

// Build Voronoi cells from Delaunay triangulation
function buildVoronoiCells(points, tris) {
  const cells={};
  for(const p of points){ cells[p.node.id]=[]; }
  for(const t of tris){
    const cc=circumcenter(t.a,t.b,t.c);
    if(!cc) continue;
    // Add this circumcenter to each vertex's cell
    [t.a,t.b,t.c].forEach(v=>{
      if(v.node&&cells[v.node.id]) cells[v.node.id].push(cc);
    });
  }
  // Sort each cell's circumcenters by angle around the node
  for(const p of points){
    const cell=cells[p.node.id]; if(!cell||cell.length<3) continue;
    cell.sort((a,b)=>Math.atan2(a.y-p.y,a.x-p.x)-Math.atan2(b.y-p.y,b.x-p.x));
  }
  return cells;
}

// ---- Territory Rendering (Voronoi) ----
function renderTerritory(g) {
  try {
    // Include ALL nodes for Voronoi geometry (even those without faction)
    if(state.nodes.length<3) return;
    const pts=state.nodes.map(n=>({x:n.x,y:n.y,node:n}));
    const tris=delaunayTriangulation(pts);
    if(tris.length===0) return;
    const cells=buildVoronoiCells(pts,tris);

    for(const p of pts){
      const cell=cells[p.node.id];
      if(!cell||cell.length<3) continue;
      const fac=(p.node.faction||'').trim();
      if(!fac) continue; // skip nodes without faction
      const color=getFactionColor(fac);
      let ptsStr='';
      for(const v of cell) ptsStr+=`${v.x},${v.y} `;
      const poly=document.createElementNS('http://www.w3.org/2000/svg','polygon');
      poly.setAttribute('points',ptsStr.trim());
      poly.setAttribute('fill',color);
      poly.setAttribute('opacity','0.15');
      poly.setAttribute('stroke',color);
      poly.setAttribute('stroke-width','0.8');
      poly.setAttribute('stroke-opacity','0.3');
      poly.setAttribute('pointer-events','none');
      g.appendChild(poly);
    }
  } catch(e) { console.warn('Territory error:',e); }
}

// ---- SVG Rendering ----
function screenToWorld(cx, cy) {
  const r=svgRoot.getBoundingClientRect();
  return { x:(cx-r.left-state.viewX)/state.scale, y:(cy-r.top-state.viewY)/state.scale };
}
function buildTransform() { return `translate(${state.viewX},${state.viewY}) scale(${state.scale})`; }

function render() {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('transform', buildTransform());

  // Grid
  const gridG = document.createElementNS('http://www.w3.org/2000/svg','g');
  const rect=svgRoot.getBoundingClientRect(), w=rect.width, h=rect.height;
  const wl=-state.viewX/state.scale, wt=-state.viewY/state.scale;
  const wr=(w-state.viewX)/state.scale, wb=(h-state.viewY)/state.scale;
  const gs=50;
  for (let x=Math.floor(wl/gs)*gs; x<=Math.ceil(wr/gs)*gs; x+=gs) {
    for (let y=Math.floor(wt/gs)*gs; y<=Math.ceil(wb/gs)*gs; y+=gs) {
      const d=document.createElementNS('http://www.w3.org/2000/svg','circle');
      d.setAttribute('cx',x); d.setAttribute('cy',y); d.setAttribute('r',1);
      d.setAttribute('class','grid-dot'); gridG.appendChild(d);
    }
  }
  g.appendChild(gridG);

  // Territory overlay
  if (state.showTerritory) renderTerritory(g);

  // Edges
  const pathEdgeSet=new Set(state.pathEdgeIds);
  for (const edge of state.edges) {
    const fn=getNodeById(edge.from), tn=getNodeById(edge.to);
    if (!fn||!tn) continue;
    const key=edgeKey(edge.from,edge.to), isPath=pathEdgeSet.has(key);
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    ['x1',fn.x,'y1',fn.y,'x2',tn.x,'y2',tn.y].forEach((v,i)=>i%2?line.setAttribute(['x1','y1','x2','y2'][Math.floor(i/2)],v):null);
    line.setAttribute('x1',fn.x); line.setAttribute('y1',fn.y);
    line.setAttribute('x2',tn.x); line.setAttribute('y2',tn.y);
    line.setAttribute('class','edge-line'+(isPath?' path-highlight':''));
    line.setAttribute('data-edge-key',key);
    line.style.pointerEvents='stroke';
    line.style.strokeWidth=isPath?'4':'2';
    const hit=document.createElementNS('http://www.w3.org/2000/svg','line');
    hit.setAttribute('x1',fn.x); hit.setAttribute('y1',fn.y);
    hit.setAttribute('x2',tn.x); hit.setAttribute('y2',tn.y);
    hit.setAttribute('stroke','transparent'); hit.setAttribute('stroke-width','12');
    hit.style.pointerEvents='stroke'; hit.setAttribute('data-edge-key',key);
    hit.addEventListener('contextmenu',(ev)=>{ ev.preventDefault(); if(state.mode==='editor') showEdgeContextMenu(ev.clientX,ev.clientY,key); });
    g.appendChild(line); g.appendChild(hit);
  }

  // Nodes
  for (const node of state.nodes) {
    let color=FACTION_COLORS[node.colorIndex]||FACTION_COLORS[0];
    if (isGray(node) && node.hasStation) color={name:'空间站',fill:'#cc8844',stroke:'#996622'};
    const nodeG=document.createElementNS('http://www.w3.org/2000/svg','g');
    nodeG.setAttribute('data-node-id',node.id); nodeG.style.cursor='pointer';

    // Selection ring
    if (state.selectedNodeId===node.id && state.mode==='editor') {
      const p=document.createElementNS('http://www.w3.org/2000/svg','circle');
      p.setAttribute('cx',node.x); p.setAttribute('cy',node.y);
      p.setAttribute('r',NODE_RADIUS+6); p.setAttribute('fill','none');
      p.setAttribute('stroke','#fff'); p.setAttribute('stroke-width','2');
      p.setAttribute('stroke-dasharray','6 3'); p.setAttribute('opacity','0.7');
      nodeG.appendChild(p);
      // Orange animated ring
      const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
      ring.setAttribute('cx',node.x); ring.setAttribute('cy',node.y);
      ring.setAttribute('r',NODE_RADIUS+5); ring.setAttribute('fill','none');
      ring.setAttribute('stroke','#ffaa00'); ring.setAttribute('stroke-width','3');
      ring.setAttribute('stroke-dasharray','8 4');
      const anim=document.createElementNS('http://www.w3.org/2000/svg','animate');
      anim.setAttribute('attributeName','stroke-dashoffset');
      anim.setAttribute('values','0;24'); anim.setAttribute('dur','1s');
      anim.setAttribute('repeatCount','indefinite');
      ring.appendChild(anim); nodeG.appendChild(ring);
    }

    const isPath=state.pathNodeIds.includes(node.id);
    const isStart=state.startNodeId===node.id;
    const isEnd=state.endNodeId===node.id;
    const isHighlighted=state.highlightedNodeIds.includes(node.id);

    // Search highlight ring (orange glow, only when not on path)
    if (isHighlighted && !isPath) {
      const hlRing=document.createElementNS('http://www.w3.org/2000/svg','circle');
      hlRing.setAttribute('cx',node.x); hlRing.setAttribute('cy',node.y);
      hlRing.setAttribute('r',NODE_RADIUS+4); hlRing.setAttribute('fill','none');
      hlRing.setAttribute('stroke','#ff8800'); hlRing.setAttribute('stroke-width','3');
      hlRing.setAttribute('opacity','0.8');
      hlRing.setAttribute('stroke-dasharray','5 3');
      nodeG.appendChild(hlRing);
    }

    let cc='node-circle';
    if (isPath) cc+=' path-node';
    if (isStart) cc+=' start-node';
    if (isEnd) cc+=' end-node';
    if (state.selectedNodeId===node.id && state.mode==='editor') cc+=' selected';

    const circle=document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx',node.x); circle.setAttribute('cy',node.y);
    circle.setAttribute('r',NODE_RADIUS); circle.setAttribute('fill',color.fill);
    circle.setAttribute('stroke',isPath?PATH_COLOR:(isStart?PATH_COLOR:(isEnd?'#ff4444':(isHighlighted&&!isPath?'#ff8800':color.stroke))));
    circle.setAttribute('class',cc);
    nodeG.appendChild(circle);

    // Trade product icons above the node
    if (!isGray(node)) {
      // Collect unique product icons with their aggregate trends
      const tradeItems = []; // [{icon, trend}]
      const seenIcons = new Set();
      for (const planet of getPlanets(node)) {
        if (planet.facilities?.trade?.active && planet.facilities.trade.products) {
          for (const item of planet.facilities.trade.products) {
            const pid = item.productId || item;
            const prod = getProductById(pid);
            if (!prod) continue;
            if (!seenIcons.has(prod.icon)) {
              seenIcons.add(prod.icon);
              tradeItems.push({ icon: prod.icon, trend: item.trend || 0 });
            } else {
              // Update trend for existing icon (red wins over green)
              const existing = tradeItems.find(ti => ti.icon === prod.icon);
              if (existing && item.trend === 1) existing.trend = 1;
              else if (existing && item.trend === -1 && existing.trend !== 1) existing.trend = -1;
            }
          }
        }
      }
      if (tradeItems.length > 0) {
        const iconY = node.y - NODE_RADIUS - 14;
        let iconStr = '';
        for (let i = 0; i < Math.min(tradeItems.length, 6); i++) {
          const ti = tradeItems[i];
          const trendIcon = ti.trend === 1 ? '🔴' : ti.trend === -1 ? '🟢' : '—';
          iconStr += ti.icon + trendIcon;
        }
        const ticon = document.createElementNS('http://www.w3.org/2000/svg','text');
        ticon.setAttribute('x', node.x);
        ticon.setAttribute('y', iconY);
        ticon.setAttribute('class', 'node-label');
        ticon.setAttribute('font-size', '9px');
        ticon.textContent = iconStr;
        nodeG.appendChild(ticon);
      }
    }

    // Name
    const label=document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x',node.x); label.setAttribute('y',node.y+4);
    label.setAttribute('class','node-label'+(isPath?' path-node':''));
    label.textContent=node.name||'未命名';
    nodeG.appendChild(label);

    // Tags
    if (isStart) {
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',node.x); t.setAttribute('y',node.y-NODE_RADIUS-8);
      t.setAttribute('class','node-tag tag-start'); t.textContent='起'; nodeG.appendChild(t);
    }
    if (isEnd) {
      const t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',node.x); t.setAttribute('y',node.y-NODE_RADIUS-8);
      t.setAttribute('class','node-tag tag-end'); t.textContent='终'; nodeG.appendChild(t);
    }
    // Waypoint tag
    const wpIdx = state.waypointIds.indexOf(node.id);
    if (wpIdx >= 0 && !isStart && !isEnd) {
      const wt=document.createElementNS('http://www.w3.org/2000/svg','text');
      wt.setAttribute('x',node.x); wt.setAttribute('y',node.y-NODE_RADIUS-8);
      wt.setAttribute('class','node-tag'); wt.setAttribute('fill','#ffaa00');
      wt.textContent='W'+(wpIdx+1); nodeG.appendChild(wt);
    }
    // Blocked node indicator
    if (state.blockedNodeIds.includes(node.id)) {
      const bt=document.createElementNS('http://www.w3.org/2000/svg','text');
      bt.setAttribute('x',node.x); bt.setAttribute('y',node.y-NODE_RADIUS-8);
      bt.setAttribute('class','node-tag'); bt.setAttribute('font-size','14px');
      bt.textContent='⛔'; nodeG.appendChild(bt);
    }
    // Space station icon for gray nodes
    if (isGray(node) && node.hasStation) {
      const st=document.createElementNS('http://www.w3.org/2000/svg','text');
      st.setAttribute('x',node.x); st.setAttribute('y',node.y-NODE_RADIUS-8);
      st.setAttribute('class','node-tag'); st.setAttribute('font-size','16px');
      st.textContent='🛰️'; nodeG.appendChild(st);
    }

    // Facility icons below name (non-gray nodes only)
    if (!isGray(node)) {
      const facY = node.y + NODE_RADIUS + 14;
      const iconW = 15;
      const totalW = FACILITY_DEFS.length * iconW;
      const startX = node.x - totalW/2 + iconW/2;

      for (let i=0; i<FACILITY_DEFS.length; i++) {
        const fd = FACILITY_DEFS[i];
        const active = isFacilityActive(node, fd.key);
        const ft = document.createElementNS('http://www.w3.org/2000/svg','text');
        ft.setAttribute('x', startX + i*iconW);
        ft.setAttribute('y', facY);
        ft.setAttribute('class','fac-icon-text '+(active?'active':'inactive'));
        ft.textContent = fd.icon;
        nodeG.appendChild(ft);
      }
      // Faction name below facility icons (if set)
      if (node.faction) {
        const factionLabel = document.createElementNS('http://www.w3.org/2000/svg','text');
        factionLabel.setAttribute('x', node.x);
        factionLabel.setAttribute('y', facY + 12);
        factionLabel.setAttribute('class', 'fac-icon-text active');
        factionLabel.setAttribute('font-size', '9px');
        factionLabel.setAttribute('fill', color.fill);
        factionLabel.textContent = node.faction;
        nodeG.appendChild(factionLabel);
      }
    } else if (node.faction) {
      // Gray nodes: show faction below name (no facility icons)
      const facY2 = node.y + NODE_RADIUS + 14;
      const factionLabel = document.createElementNS('http://www.w3.org/2000/svg','text');
      factionLabel.setAttribute('x', node.x);
      factionLabel.setAttribute('y', facY2);
      factionLabel.setAttribute('class', 'fac-icon-text active');
      factionLabel.setAttribute('font-size', '9px');
      factionLabel.setAttribute('fill', color.fill);
      factionLabel.textContent = node.faction;
      nodeG.appendChild(factionLabel);
    }

    // Events
    nodeG.addEventListener('mousedown',(ev)=>onNodeMouseDown(ev,node.id));
    nodeG.addEventListener('click',(ev)=>onNodeClick(ev,node.id));
    nodeG.addEventListener('contextmenu',(ev)=>{
      ev.preventDefault();
      if (state.mode==='map') showNodeDetail(node.id);
    });
    nodeG.addEventListener('mouseenter',()=>{ state.hoveredNodeId=node.id; showTooltip(node); });
    nodeG.addEventListener('mouseleave',()=>{ state.hoveredNodeId=null; hideTooltip(); });
    nodeG.addEventListener('dblclick',(ev)=>{ ev.stopPropagation(); if(state.mode==='editor') selectNode(node.id); });

    g.appendChild(nodeG);
  }

  while (svgRoot.firstChild) svgRoot.removeChild(svgRoot.firstChild);
  svgRoot.appendChild(g);
  zoomIndicator.textContent=Math.round(state.scale*100)+'%';
  updatePanelContent();

  // Legend visibility
  legendBox.style.display = (state.nodes.some(n=>!isGray(n) && hasAnyFacility(n))) ? 'block' : 'none';
  // Update product legend
  var pl2 = document.getElementById('legend2-products');
  if (pl2 && state.products.length > 0) {
    pl2.innerHTML = state.products.map(function(p){ return '<div class=\"leg-item\">'+p.icon+' '+p.name+'</div>'; }).join('');
  }
}

function isFacilityActive(node, key) {
  for (const p of getPlanets(node)) {
    const f = p.facilities; if (!f) continue;
    switch(key) {
      case 'bar': if (f.bar?.active) return true; break;
      case 'mission': if (f.mission) return true; break;
      case 'shipyard': if (f.shipyard?.active) return true; break;
      case 'equipment': if (f.equipment) return true; break;
      case 'trade': if (f.trade?.active) return true; break;
      case 'fleet': if (f.fleet) return true; break;
    }
  }
  return false;
}

// ---- Tooltip ----
function showTooltip(node) {
  let color=FACTION_COLORS[node.colorIndex]||FACTION_COLORS[0];
  if (isGray(node) && node.hasStation) color={name:'空间站',fill:'#cc8844',stroke:'#996622'};
  const r=svgRoot.getBoundingClientRect();
  const sx=r.left+(node.x*state.scale)+state.viewX;
  const sy=r.top+(node.y*state.scale)+state.viewY;

  let html = `<div class="tt-name">${node.name||'未命名'}</div>`;
  html += `<div style="color:${color.fill}">${color.name}</div>`;

  if (!isGray(node) && hasAnyFacility(node)) {
    html += '<div class="tt-fac">';
    const planets = getPlanets(node);
    for (const planet of planets) {
      const f = planet.facilities; if (!f) continue;
      const hasF = f.bar?.active || f.mission || f.shipyard?.active || f.equipment || f.trade?.active || f.fleet;
      if (!hasF) continue;
      html += `<div style="margin-top:3px;"><b>🪐 ${escapeHtml(planet.name)}</b></div>`;

      if (f.bar?.active) {
        html += '<div>🍺 <b>酒吧</b>'+(f.bar.npcs.length>0?` (${f.bar.npcs.length}位NPC)`:'')+'</div>';
      }
      if (f.mission) html += '<div>📋 任务中心</div>';
      if (f.shipyard?.active) {
        html += '<div>🚀 船坞:</div>';
        if (f.shipyard.shipIds?.length>0) {
          f.shipyard.shipIds.forEach(id=>{
            const s=getShipById(id);
            if (s) html += `<div style="padding-left:14px;">- ${escapeHtml(s.name)} (💰${(s.price||0).toLocaleString()})</div>`;
          });
        } else { html += '<div style="padding-left:14px;color:#888;">暂无船只</div>'; }
      }
      if (f.equipment) html += '<div>🔧 装备中心</div>';
      if (f.trade?.active) {
        html += '<div>💰 贸易中心:</div>';
        if (f.trade.products?.length>0) {
          f.trade.products.forEach(item=>{
            const pid=item.productId||item;
            const p=getProductById(pid);
            if (p) html += `<div style="padding-left:14px;">- ${p.icon} ${escapeHtml(p.name)}</div>`;
          });
        } else { html += '<div style="padding-left:14px;color:#888;">暂无产品</div>'; }
      }
      if (f.fleet) html += '<div>🏛️ 舰队管理</div>';
    }
    html += '</div>';
  }

  tooltip.innerHTML=html;
  tooltip.style.display='block';
  tooltip.style.left=(sx+NODE_RADIUS+16)+'px';
  tooltip.style.top=(sy-30)+'px';
}

function hideTooltip() { tooltip.style.display='none'; }

// ---- Detail Panel (map mode click) ----
function showNodeDetail(nodeId) {
  const node = getNodeById(nodeId);
  if (!node) return;
  let color=FACTION_COLORS[node.colorIndex]||FACTION_COLORS[0];
  if (isGray(node) && node.hasStation) color={name:'空间站',fill:'#cc8844',stroke:'#996622'};

  let html = `<button class="dp-close" onclick="hideDetail()">✕</button>`;
  html += `<h2>${node.name||'未命名'}</h2>`;
  html += `<div class="dp-color" style="color:${color.fill}">${color.name}</div>`;

  if (!isGray(node) && node.planets && node.planets.length>0) {
    for (const planet of node.planets) {
      const f = planet.facilities; if (!f) continue;
      const hasF = f.bar?.active || f.mission || f.shipyard?.active || f.equipment || f.trade?.active || f.fleet;
      if (!hasF) continue;
      html += `<div class="dp-section"><h3>🪐 ${escapeHtml(planet.name)}</h3>`;

      if (f.bar?.active) {
        html += '<div><b>🍺 酒吧</b><br>';
        if (f.bar.npcs.length>0) {
          html += '<p>'+f.bar.npcs.map(n=>`<b>${escapeHtml(n.name)}</b> — ${escapeHtml(n.role)}`).join('<br>')+'</p>';
        } else { html += '<p>暂无NPC</p>'; }
        html += '</div>';
      }
      if (f.mission) html += '<div><b>📋 任务中心</b><br><p>可接取任务</p></div>';
      if (f.shipyard?.active) {
        html += '<div><b>🚀 船坞</b><br>';
        if (f.shipyard.shipIds && f.shipyard.shipIds.length>0) {
          for (const sid of f.shipyard.shipIds) {
            const ship = getShipById(sid);
            if (ship) {
              const ftl = ship.fuelPerJump>0 ? Math.floor(ship.fuelMax / ship.fuelPerJump) : 0;
              const typeStr = ship.type ? `[${escapeHtml(ship.type)}] ` : '';
              html += `<p style="margin-bottom:6px;"><b>${typeStr}${escapeHtml(ship.name)}</b><br>`;
              html += `💰 ${(ship.price||0).toLocaleString()} | ⛽ ${ship.fuelMax||0}/${ship.fuelPerJump||0}(${ftl}x FTL)<br>`;
              html += `🔄 ${(ship.turnRate||0).toFixed(3)} | ⚡ ${(ship.maxSpeed||0).toFixed(3)} | ❤ ${ship.hp||0}<br>`;
              html += `📦 货舱:${ship.cargoSpace||0} ⚖ 质量:${ship.mass||0} 🏃 加速度:${(ship.acceleration||0).toFixed(3)}<br>`;
              html += `🛡 护盾:${ship.shield||0}(${(ship.shieldRecharge||0).toFixed(2)}/s) | ⚡发电机:${ship.generator||0}(${(ship.generatorRate||0).toFixed(2)}/s)`;
              if (ship.equipment) html += `<br>🛡 装备: ${escapeHtml(ship.equipment)}`;
              if (ship.weapons) html += `<br>🔫 武器: ${escapeHtml(ship.weapons)}`;
              if (ship.condition) html += `<br>📋 条件: ${escapeHtml(ship.condition)}`;
              html += `</p>`;
            }
          }
        } else { html += '<p>暂无出售船只</p>'; }
        html += '</div>';
      }
      if (f.equipment) html += '<div><b>🔧 装备中心</b><br><p>可购买装备</p></div>';
      if (f.trade?.active) {
        html += '<div><b>💰 贸易中心</b><br>';
        if (f.trade.products && f.trade.products.length>0) {
          html += '<p>';
          for (const item of f.trade.products) {
            const pid = item.productId || item;
            const prod = getProductById(pid);
            if (prod) html += `${prod.icon} <b>${escapeHtml(prod.name)}</b> 💰${(item.priceMin||0)}/${(item.priceMax||0)}<br>`;
          }
          html += '</p>';
        } else { html += '<p>暂无交易产品</p>'; }
        html += '</div>';
      }
      if (f.fleet) html += '<div><b>🏛️ 舰队管理</b><br><p>可管理舰队</p></div>';
      html += '</div>';
    }
  } else if (isGray(node)) {
    html += '<p style="color:var(--text-dim);margin-top:12px;">灰色星域，无星球设施。</p>';
    html += `<label class="facility-row" style="margin-top:8px;"><input type="checkbox" id="detail-cb-station" ${node.hasStation?'checked':''} onchange="toggleStationFromDetail('${node.id}',this.checked)"> 🛰️ 布置空间站</label>`;
  }

  detailPanel.innerHTML = html;
  detailOverlay.style.display = 'flex';
}

function hideDetail() { detailOverlay.style.display='none'; }
detailOverlay.addEventListener('click',(e)=>{ if(e.target===detailOverlay) hideDetail(); });
function toggleStationFromDetail(nodeId, checked) {
  const node = getNodeById(nodeId);
  if (node) { node.hasStation = checked; saveData(); render(); }
}
function updateTradePrice(input) {
  const tpid = input.dataset.tpid;
  const planet = getEditingPlanet();
  if (!planet?.facilities?.trade) return;
  const item = planet.facilities.trade.products.find(x => (x.productId||x) === tpid);
  if (item) { item.priceMin = parseInt(input.value) || 0; item.priceMax = parseInt(input.value) || 0; saveData(); }
}
function updateViewTradePrice(input) {
  const tpid = input.dataset.tpid;
  const nid = input.dataset.nid;
  const planetId = input.dataset.planetid;
  const node = getNodeById(nid);
  if (!node) return;
  const planet = getPlanetById(node, planetId);
  if (!planet?.facilities?.trade) return;
  const item = planet.facilities.trade.products.find(x => (x.productId||x) === tpid);
  if (item) { item.priceMin = parseInt(input.value) || 0; item.priceMax = parseInt(input.value) || 0; saveData(); }
}

// ---- Left Panel Rendering ----
function updatePanelContent() {
  if (state.activePanelTab==='planet') renderPlanetTab();
  else if (state.activePanelTab==='ship') renderShipTab();
  else renderProductTab();
}

function renderPlanetTab() {
  let html = '';

  // Color palette
  html += '<div class="panel-section"><div class="panel-label">🎨 星系颜色</div><div class="color-grid">';
  FACTION_COLORS.forEach((c,i)=>{
    html += `<div class="color-chip${i===state.selectedColorIndex?' selected':''}" data-action="select-color" data-idx="${i}">`;
    html += `<span class="color-dot" style="background:${c.fill};border-color:${c.stroke};"></span>${c.name}</div>`;
  });
  html += '</div></div>';

  const selNode = state.selectedNodeId ? getNodeById(state.selectedNodeId) : null;
  if (selNode && state.mode==='editor') {
    // Node name
    html += '<div class="panel-section"><div class="panel-label">🌌 星系名称</div>';
    html += `<div class="info-row"><input type="text" id="node-name-input" value="${escapeHtml(selNode.name||'')}" placeholder="星系名称" maxlength="20"></div>`;
    html += '<div class="panel-section"><div class="panel-label">🏴 派系</div>';
    html += `<div class="info-row"><input type="text" id="node-faction-input" value="${escapeHtml(selNode.faction||'')}" placeholder="例如: OSC联盟, 帝国, 自由联邦…" maxlength="30"></div></div>`;
    html += `<button class="tb-btn danger small" id="btn-delete-node" style="margin-top:4px;">🗑 删除此星系</button></div>`;

    // Planets (non-gray only)
    if (!isGray(selNode)) {
      const planets = selNode.planets || [];
      html += '<div class="panel-section"><div class="panel-label">🪐 行星列表 ('+planets.length+')</div>';

      for (const planet of planets) {
        const isEditing = state.editingPlanetId === planet.id;
        html += `<div class="global-item" style="${isEditing?'flex-direction:column;align-items:stretch;':''}" data-planet-id="${planet.id}">`;
        if (!isEditing) {
          const facCount = countPlanetFacilities(planet);
          html += `<span class="gi-icon">🪐</span>`;
          html += `<div class="gi-info"><div class="gi-name">${escapeHtml(planet.name)}</div><div class="gi-sub">${facCount}个设施</div></div>`;
          html += `<span class="gi-del" data-action="del-planet" data-pid="${planet.id}">✕</span>`;
        } else {
          // Planet name editor
          html += `<div class="info-row"><input type="text" id="planet-name-input" value="${escapeHtml(planet.name)}" placeholder="行星名称" style="flex:1;"></div>`;
          // Facilities for this planet
          ensurePlanetFacs(planet);
          html += '<div style="margin-top:6px;">';
          for (const fd of FACILITY_DEFS) {
            const active = isPlanetFacActive(planet, fd.key);
            html += `<label class="facility-row"><input type="checkbox" data-fac="${fd.key}" ${active?'checked':''}> ${fd.icon} ${fd.label}</label>`;

            if (fd.key==='bar' && active) {
              html += '<div class="item-list" id="npc-list">';
              for (let ni=0; ni<(planet.facilities.bar.npcs||[]).length; ni++) {
                const npc = planet.facilities.bar.npcs[ni];
                html += `<div class="item-chip"><span>${escapeHtml(npc.name)} — ${escapeHtml(npc.role)}</span><span class="rm-btn" data-action="del-npc" data-idx="${ni}">✕</span></div>`;
              }
              html += '</div>';
              html += '<div class="info-row" style="margin-top:4px;">';
              html += '<input type="text" id="npc-name" placeholder="NPC名称" style="width:45%;">';
              html += '<input type="text" id="npc-role" placeholder="职业" style="width:35%;">';
              html += '<button class="tb-btn small" id="btn-add-npc">+</button></div>';
            }

            if (fd.key==='shipyard' && active) {
              html += '<div class="item-list" id="shipyard-ships">';
              for (const sid of (planet.facilities.shipyard.shipIds||[])) {
                const ship = getShipById(sid);
                html += `<div class="item-chip"><span>🚀 ${ship?ship.name:'(已删除)'}</span><span class="rm-btn" data-action="del-ship" data-sid="${sid}">✕</span></div>`;
              }
              html += '</div>';
              html += '<div class="info-row" style="margin-top:4px;"><select id="ship-select" style="flex:1;">';
              html += '<option value="">-- 选择船只 --</option>';
              for (const ship of state.ships) {
                if (!planet.facilities.shipyard.shipIds.includes(ship.id)) {
                  html += `<option value="${ship.id}">${escapeHtml(ship.name)}</option>`;
                }
              }
              html += '</select><button class="tb-btn small" id="btn-add-ship">+</button></div>';
              if (state.ships.length===0) html += '<div class="panel-hint" style="margin-top:4px;">请先在 🚀船只 标签中添加船只</div>';
            }

            if (fd.key==='trade' && active) {
              html += '<div class="item-list" id="trade-prods">';
              for (const item of (planet.facilities.trade.products||[])) {
                const tpid = item.productId || item;
                const prod = getProductById(tpid);
                const trendIcons = {1:'🔴',0:'—',[-1]:'🟢'};
                const trendEmoji = trendIcons[item.trend||0] || trendIcons[0];
                const pmin = item.priceMin||item.price||0, pmax = item.priceMax||item.price||0;
                html += `<div class="item-chip"><span>${prod?prod.icon:''} ${prod?prod.name:'(已删除)'} 💰${pmin}/${pmax}</span><span style="cursor:pointer;font-size:12px;" data-action="toggle-trend" data-tpid="${tpid}" title="点击切换涨跌">${trendEmoji}</span><span class="rm-btn" data-action="del-prod" data-pid="${tpid}">✕</span></div>`;
              }
              html += '</div>';
              html += '<div class="info-row" style="margin-top:4px;"><select id="prod-select" style="flex:1;">';
              html += '<option value="">-- 选择产品 --</option>';
              for (const prod of state.products) {
                if (!planet.facilities.trade.products.some(x=>(x.productId||x)===prod.id)) {
                  html += `<option value="${prod.id}">${prod.icon} ${escapeHtml(prod.name)}</option>`;
                }
              }
              html += '</select><button class="tb-btn small" id="btn-add-prod">+</button></div>';
              if (state.products.length===0) html += '<div class="panel-hint" style="margin-top:4px;">请先在 📦产品 标签中添加产品</div>';
            }
          }
          html += '</div>';
          html += '<button class="tb-btn small" id="btn-done-planet" style="margin-top:4px;">✓ 完成编辑</button>';
        }
        html += '</div>';
      }

      html += '<button class="tb-btn small" id="btn-add-planet" style="margin-top:4px;">➕ 添加行星</button>';
      html += '</div>';
    } else {
      html += '<div class="panel-section"><div class="panel-label">🪐 行星</div>';
      html += '<div class="panel-hint">灰色星域不包含行星。</div></div>';
    }
  } else if (state.mode==='editor') {
    html += '<div class="panel-section"><div class="panel-label">🪐 行星编辑</div>';
    html += '<div class="panel-hint">单击选中一个星系以编辑其行星。</div></div>';
  }

  // Hints
  if (state.mode==='editor') {
    html += '<div class="panel-section"><div class="panel-label">🧪 模拟测试</div>';
    html += '<button class="tb-btn small" id="btn-sim-prices">🎲 随机生成所有贸易价格</button>';
    html += '<div class="panel-hint">为所有有贸易中心的星球产品随机生成最低/最高价</div></div>';
    html += '<div class="panel-section"><div class="panel-label">💡 操作提示</div>';
    html += '<div class="panel-hint"><kbd>双击画布</kbd> 添加星系<br><kbd>拖拽</kbd> 移动星系<br><kbd>单击</kbd> 选中星系<br><kbd>Shift+点击</kbd> 建立通道<br><kbd>右键连线</kbd> 删除通道<br><kbd>Delete</kbd> 删除星系<br><kbd>滚轮</kbd> 缩放画布</div></div>';
  } else {
    // Map mode panel
    html += '<div class="panel-section"><div class="panel-label">🗺️ 地图模式</div>';
    html += '<div class="mode-group" style="margin-bottom:4px;">';
    html += `<button class="mode-btn${state.mapSubMode==='nav'?' active':''}" id="btn-sub-nav">🧭 导航</button>`;
    html += `<button class="mode-btn${state.mapSubMode==='view'?' active':''}" id="btn-sub-view">🔍 查看</button>`;
    html += '</div>';

    if (state.mapSubMode === 'nav') {
    // Path mode toggle
    html += '<div class="panel-label">🛤️ 寻路模式</div>';
    html += '<div class="mode-group" style="margin-bottom:8px;">';
    html += `<button class="mode-btn${state.pathMode==='shortest'?' active':''}" id="btn-path-short">📏 最短距离</button>`;
    html += `<button class="mode-btn${state.pathMode==='norefuel'?' active':''}" id="btn-path-norefuel">⛽ 无补给最短</button>`;
    html += '</div>';
    html += '<div class="panel-hint" style="margin-bottom:4px;">';
    html += state.pathMode==='norefuel' ? '🔵🔴=补给点，验证FTL可行性' : '最少跳数路径';
    html += '</div>';
    if (state.pathMode === 'norefuel') {
      html += '<div class="info-row" style="margin-bottom:8px;">';
      html += `<span style="font-size:11px;white-space:nowrap;">⛽ FTL范围:</span>`;
      html += `<input type="number" id="ftl-input" value="${state.ftlRange||''}" placeholder="最大无补给跳数" min="0" style="flex:1;">`;
      html += '</div>';
      html += '<div class="panel-hint" style="margin-bottom:4px;">起点→最近补给≤FTL；终点无补给则最长段×2≤FTL</div>';
    }
    // Waypoint list
    html += '<div class="panel-label">🔶 途径点 ('+state.waypointIds.length+')</div>';
    if (state.waypointIds.length > 0) {
      html += '<div class="item-list">';
      state.waypointIds.forEach((wid, i) => {
        const wn = getNodeById(wid);
        html += `<div class="item-chip"><span>W${i+1}: ${escapeHtml(wn?.name||'?')}</span><span class="rm-btn" data-action="del-waypoint" data-idx="${i}">✕</span></div>`;
      });
      html += '</div>';
      html += '<button class="tb-btn small" id="btn-clear-waypoints" style="margin-top:4px;">清除全部途径点</button>';
    } else {
      html += '<div class="panel-hint">Ctrl+点击节点添加途径点</div>';
    }
    html += '<div class="panel-section"><div class="panel-label">💡 操作</div>';
    html += '<div class="panel-hint"><kbd>单击</kbd> 起点/终点<br><kbd>Ctrl+单击</kbd> 途径点<br><kbd>Shift+单击</kbd> 障碍⛔<br><kbd>右键</kbd> 详情/空间站<br><kbd>点击空白</kbd> 清除</div>';
    // 障碍列表
    if (state.blockedNodeIds.length > 0) {
      html += '<div class="panel-label">⛔ 障碍节点 ('+state.blockedNodeIds.length+')</div>';
      html += '<div class="item-list">';
      for (var bi = 0; bi < state.blockedNodeIds.length; bi++) {
        var bn = getNodeById(state.blockedNodeIds[bi]);
        html += '<div class="item-chip"><span>⛔ '+(bn?bn.name:'?')+'</span><span class="rm-btn" data-action="unblock" data-nid="'+state.blockedNodeIds[bi]+'">✕</span></div>';
      }
      html += '</div>';
    }
    // 空间站
    const selGray = state.startNodeId ? getNodeById(state.startNodeId) : null;
    if (selGray && isGray(selGray)) {
      html += `<div style="margin-top:6px;"><label class="facility-row"><input type="checkbox" id="cb-station" ${selGray.hasStation?'checked':''}> 🛰️ ${escapeHtml(selGray.name)} 布置空间站</label></div>`;
    }
    html += '</div>';
    } else { // view mode
      html += '<div class="panel-section"><div class="panel-label">🔍 查看模式</div>';
      if (state.viewNodeId) {
        html += renderViewModePanel(state.viewNodeId);
      } else {
        html += '<div class="panel-hint">点击星系查看其行星和设施详情</div>';
      }
      html += '<div class="panel-hint" style="margin-top:8px;"><kbd>单击星球</kbd> 查看详情<br><kbd>右键</kbd> 详情弹窗</div>';
    }
  }

  panelContent.innerHTML = html;
  bindPlanetTabEvents();
  // Bind sub-mode buttons (if in map mode)
  const btnNav = panelContent.querySelector('#btn-sub-nav');
  const btnView = panelContent.querySelector('#btn-sub-view');
  if (btnNav) btnNav.addEventListener('click', ()=>{ state.mapSubMode='nav'; state.viewNodeId=null; updatePanelContent(); });
  if (btnView) btnView.addEventListener('click', ()=>{ state.mapSubMode='view'; updatePanelContent(); });
  // Path mode buttons
  const btnShort = panelContent.querySelector('#btn-path-short');
  const btnNoRefuel = panelContent.querySelector('#btn-path-norefuel');
  if (btnShort) btnShort.addEventListener('click', ()=>{ state.pathMode='shortest'; if(state.startNodeId&&state.endNodeId) computePath(); updatePanelContent(); render(); updatePathDisplay(); });
  if (btnNoRefuel) btnNoRefuel.addEventListener('click', ()=>{ state.pathMode='norefuel'; if(state.startNodeId&&state.endNodeId) computePath(); updatePanelContent(); render(); updatePathDisplay(); });
  // FTL input
  const ftlInp = panelContent.querySelector('#ftl-input');
  if (ftlInp) ftlInp.addEventListener('input', ()=>{
    state.ftlRange = parseInt(ftlInp.value) || 0;
    if (state.startNodeId && state.endNodeId && state.pathMode==='norefuel') { computePath(); render(); updatePathDisplay(); }
  });
}

function ve(key) { return state.viewExpanded[key] || false; }
function toggleVE(key) { state.viewExpanded[key] = !state.viewExpanded[key]; updatePanelContent(); }

function renderViewModePanel(nodeId) {
  const node = getNodeById(nodeId);
  if (!node || isGray(node)) return `<div class="panel-hint">${node?'灰色星域，无行星':'未找到星系'}</div>`;
  let h = '';
  const planets = getPlanets(node);
  for (const planet of planets) {
    const pid = planet.id;
    const pExp = ve(pid);
    h += `<div style="margin-bottom:6px;border:1px solid var(--border);border-radius:6px;padding:8px;background:var(--bg);">`;
    h += `<div style="display:flex;align-items:center;gap:6px;cursor:pointer;" onclick="toggleVE('${pid}')">`;
    h += `<span style="font-size:10px;width:12px;">${pExp?'▾':'▸'}</span>`;
    h += `<span style="font-weight:700;color:var(--text-bright);">🪐 ${escapeHtml(planet.name)}</span>`;
    h += `<span style="font-size:10px;color:var(--text-dim);">(${countPlanetFacilities(planet)}设施)</span>`;
    h += '</div>';

    if (pExp) {
      h += '<div style="margin-left:16px;margin-top:4px;">';
      const f = planet.facilities; if (!f) { h += '</div></div>'; continue; }

      // Bar
      if (f.bar?.active) {
        const bk = pid+'|bar', bExp = ve(bk);
        h += `<div style="cursor:pointer;margin:2px 0;" onclick="toggleVE('${bk}')"><span style="font-size:10px;width:12px;">${bExp?'▾':'▸'}</span> 🍺 <b>酒吧</b> (${(f.bar.npcs||[]).length}NPC)</div>`;
        if (bExp) {
          if (f.bar.npcs.length>0) {
            for (const npc of f.bar.npcs) h += `<div style="margin-left:20px;font-size:11px;">- ${escapeHtml(npc.name)} (${escapeHtml(npc.role)})</div>`;
          } else { h += '<div style="margin-left:20px;font-size:11px;color:#888;">无NPC</div>'; }
        }
      }
      if (f.mission) h += '<div style="margin:2px 0;margin-left:12px;">📋 <b>任务中心</b></div>';
      if (f.equipment) h += '<div style="margin:2px 0;margin-left:12px;">🔧 <b>装备中心</b></div>';
      if (f.fleet) h += '<div style="margin:2px 0;margin-left:12px;">🏛️ <b>舰队管理</b></div>';

      // Shipyard
      if (f.shipyard?.active) {
        const sk = pid+'|shipyard', sExp = ve(sk);
        const shipCnt = f.shipyard.shipIds?.length||0;
        h += `<div style="display:flex;align-items:center;gap:4px;margin:2px 0;">`;
        h += `<span style="cursor:pointer;" onclick="toggleVE('${sk}')"><span style="font-size:10px;width:12px;">${sExp?'▾':'▸'}</span> 🚀 <b>船坞</b> (${shipCnt}艘)</span>`;
        if (shipCnt>0) {
          const allExp = shipCnt>0 && f.shipyard.shipIds.every(sid=>ve(sid));
          h += `<button class="tb-btn small" style="margin-left:8px;font-size:9px;padding:2px 6px;" onclick="event.stopPropagation();toggleAllShips('${pid}')">${allExp?'收起':'全部展开'}</button>`;
        }
        h += '</div>';
        if (sExp) {
          for (const sid of f.shipyard.shipIds||[]) {
            const ship = getShipById(sid);
            if (!ship) continue;
            const shipExp = ve(sid);
            const ftl = ship.fuelPerJump>0?Math.floor(ship.fuelMax/ship.fuelPerJump):0;
            h += `<div style="margin-left:20px;cursor:pointer;" onclick="toggleVE('${sid}')">`;
            h += `<span style="font-size:10px;width:12px;">${shipExp?'▾':'▸'}</span> <b>${escapeHtml(ship.name)}</b>`;
            h += ` <span style="font-size:10px;color:var(--text-dim);">💰${(ship.price||0).toLocaleString()} ⛽${ship.fuelMax||0}/${ship.fuelPerJump||0}(${ftl}xFTL)</span>`;
            h += '</div>';
            if (shipExp) {
              h += '<div style="margin-left:32px;font-size:10px;color:var(--text-dim);line-height:1.8;">';
              h += '<table style="border-collapse:collapse;font-size:10px;">';
              const addRow = (label, value, emoji) => {
                h += `<tr><td style="text-align:right;padding-right:4px;white-space:nowrap;">${label}：</td><td>${value}</td><td style="padding-left:4px;">${emoji}</td></tr>`;
              };
              if (ship.type) addRow('类型', escapeHtml(ship.type), '');
              addRow('价格', (ship.price||0).toLocaleString(), '💰');
              addRow('最大油量', (ship.fuelMax||0), '⛽');
              addRow('FTL消耗', (ship.fuelPerJump||0), '⛽');
              addRow('转速', (ship.turnRate||0).toFixed(3), '🔄');
              addRow('最大航速', (ship.maxSpeed||0).toFixed(3), '⚡');
              addRow('护盾', (ship.shield||0)+'('+(ship.shieldRecharge||0).toFixed(2)+'/s)', '🛡');
              addRow('货舱大小', (ship.cargoSpace||0), '📦');
              addRow('质量', (ship.mass||0), '⚖');
              addRow('血量', (ship.hp||0), '❤');
              addRow('加速度', (ship.acceleration||0).toFixed(3), '🏃');
              addRow('发电机', (ship.generator||0)+'('+(ship.generatorRate||0).toFixed(2)+'/s)', '⚡');
              if (ship.equipment) addRow('装备配置', escapeHtml(ship.equipment), '🛡');
              if (ship.weapons) addRow('武器', escapeHtml(ship.weapons), '🔫');
              if (ship.condition) addRow('条件', escapeHtml(ship.condition), '📋');
              h += '</table></div>';
            }
          }
        }
      }

      // Trade
      if (f.trade?.active) {
        const tk = pid+'|trade', tExp = ve(tk);
        const prodCnt = f.trade.products?.length||0;
        h += `<div style="display:flex;align-items:center;gap:4px;margin:2px 0;">`;
        h += `<span style="cursor:pointer;" onclick="toggleVE('${tk}')"><span style="font-size:10px;width:12px;">${tExp?'▾':'▸'}</span> 💰 <b>贸易中心</b> (${prodCnt}产品)</span>`;
        if (prodCnt>0) {
          const allExp = f.trade.products.every(x=>ve('tradeprice|'+(x.productId||x)));
          h += `<button class="tb-btn small" style="margin-left:8px;font-size:9px;padding:2px 6px;" onclick="event.stopPropagation();toggleAllTradePrices('${pid}')">${allExp?'收起':'全部展开'}</button>`;
        }
        h += '</div>';
        if (tExp) {
          for (const item of f.trade.products||[]) {
            const tpid = item.productId||item;
            const prod = getProductById(tpid);
            if (!prod) continue;
            h += `<div style="margin-left:20px;font-size:11px;">- ${prod.icon} ${escapeHtml(prod.name)}`;
            h += ` 💰${item.priceMin||item.price||0}/${item.priceMax||item.price||0}`;
            h += '</div>';
          }
        }
      }

      h += '</div>'; // close margin-left
    }
    h += '</div>'; // close planet card
  }
  return h || '<div class="panel-hint">该星系暂无行星</div>';
}

function toggleAllShips(planetId) {
  const node = state.viewNodeId ? getNodeById(state.viewNodeId) : null;
  if (!node) return;
  const planet = getPlanetById(node, planetId);
  if (!planet?.facilities?.shipyard) return;
  const allExp = planet.facilities.shipyard.shipIds.every(sid=>ve(sid));
  for (const sid of planet.facilities.shipyard.shipIds) {
    state.viewExpanded[sid] = !allExp;
  }
  updatePanelContent();
}
function toggleAllTradePrices(planetId) {
  const node = state.viewNodeId ? getNodeById(state.viewNodeId) : null;
  if (!node) return;
  const planet = getPlanetById(node, planetId);
  if (!planet?.facilities?.trade) return;
  const allExp = planet.facilities.trade.products.every(x=>ve('tradeprice|'+(x.productId||x)));
  for (const item of planet.facilities.trade.products||[]) {
    state.viewExpanded['tradeprice|'+(item.productId||item)] = !allExp;
  }
  updatePanelContent();
}

function isPlanetFacActive(planet, key) {
  const f = planet.facilities; if (!f) return false;
  switch(key) {
    case 'bar': return f.bar?.active || false;
    case 'mission': return f.mission || false;
    case 'shipyard': return f.shipyard?.active || false;
    case 'equipment': return f.equipment || false;
    case 'trade': return f.trade?.active || false;
    case 'fleet': return f.fleet || false;
    default: return false;
  }
}

function countPlanetFacilities(planet) {
  let cnt = 0;
  const f = planet.facilities; if (!f) return 0;
  if (f.bar?.active) cnt++;
  if (f.mission) cnt++;
  if (f.shipyard?.active) cnt++;
  if (f.equipment) cnt++;
  if (f.trade?.active) cnt++;
  if (f.fleet) cnt++;
  return cnt;
}

function getEditingPlanet() {
  const node = state.selectedNodeId ? getNodeById(state.selectedNodeId) : null;
  if (!node || !state.editingPlanetId || isGray(node)) return null;
  return getPlanetById(node, state.editingPlanetId);
}

function bindPlanetTabEvents() {
  // Color chips
  panelContent.querySelectorAll('[data-action="select-color"]').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const idx=parseInt(chip.dataset.idx);
      state.selectedColorIndex=idx;
      const selNode=state.selectedNodeId?getNodeById(state.selectedNodeId):null;
      if (selNode && state.mode==='editor') {
        const wasGray=isGray(selNode);
        selNode.colorIndex=idx;
        const nowGray=isGray(selNode);
        // Handle gray <-> non-gray transition
        if (wasGray && !nowGray) selNode.planets = [defaultPlanet(selNode.name)];
        if (!wasGray && nowGray) selNode.planets = null;
        saveData(); render();
      } else { updatePanelContent(); }
    });
  });

  // Node name input
  const nameInp=panelContent.querySelector('#node-name-input');
  if (nameInp) {
    nameInp.addEventListener('input',()=>{
      const node=state.selectedNodeId?getNodeById(state.selectedNodeId):null;
      if (node) { node.name=nameInp.value||'未命名'; saveData(); }
      const label=svgRoot.querySelector(`[data-node-id="${node?.id}"] .node-label`);
      if (label) label.textContent=node?.name||'未命名';
    });
    nameInp.addEventListener('blur',()=>render());
  }

  // Faction input
  const facInp=panelContent.querySelector('#node-faction-input');
  if (facInp) {
    facInp.addEventListener('input',()=>{
      const node=state.selectedNodeId?getNodeById(state.selectedNodeId):null;
      if (node) { node.faction=facInp.value; saveData(); }
    });
  }

  // Delete node
  const delBtn=panelContent.querySelector('#btn-delete-node');
  if (delBtn) delBtn.addEventListener('click',()=>{ if(state.selectedNodeId) deleteNode(state.selectedNodeId); });

  // Facility checkboxes (on editing planet)
  panelContent.querySelectorAll('[data-fac]').forEach(cb=>{
    cb.addEventListener('change',()=>{
      const planet = getEditingPlanet();
      if (!planet) return;
      ensurePlanetFacs(planet);
      setFacilityActivePlanet(planet, cb.dataset.fac, cb.checked);
      saveData(); render();
    });
  });

  // Add NPC
  const btnNpc=panelContent.querySelector('#btn-add-npc');
  if (btnNpc) btnNpc.addEventListener('click',()=>{
    const nName=panelContent.querySelector('#npc-name')?.value?.trim();
    const nRole=panelContent.querySelector('#npc-role')?.value?.trim();
    if (!nName||!nRole) return;
    const planet = getEditingPlanet();
    if (planet?.facilities?.bar) { planet.facilities.bar.npcs.push({name:nName,role:nRole}); saveData(); render(); }
  });

  // Add ship to shipyard
  const btnShip=panelContent.querySelector('#btn-add-ship');
  if (btnShip) btnShip.addEventListener('click',()=>{
    const sel=panelContent.querySelector('#ship-select')?.value;
    if (!sel) return;
    const planet = getEditingPlanet();
    if (planet?.facilities?.shipyard) { planet.facilities.shipyard.shipIds.push(sel); saveData(); render(); }
  });

  // Add product to trade
  const btnProd=panelContent.querySelector('#btn-add-prod');
  if (btnProd) btnProd.addEventListener('click',()=>{
    const sel=panelContent.querySelector('#prod-select')?.value;
    if (!sel) return;
    const planet = getEditingPlanet();
    if (planet?.facilities?.trade) { planet.facilities.trade.products.push({productId:sel,priceMin:0,priceMax:0,trend:0}); saveData(); render(); }
  });

  // Delete NPC
  panelContent.querySelectorAll('[data-action="del-npc"]').forEach(b=>{
    b.addEventListener('click',()=>{
      const planet = getEditingPlanet();
      if (planet?.facilities?.bar) {
        planet.facilities.bar.npcs.splice(parseInt(b.dataset.idx),1); saveData(); render();
      }
    });
  });

  // Remove ship from shipyard
  panelContent.querySelectorAll('[data-action="del-ship"]').forEach(b=>{
    b.addEventListener('click',()=>{
      const planet = getEditingPlanet();
      if (planet?.facilities?.shipyard) {
        planet.facilities.shipyard.shipIds=planet.facilities.shipyard.shipIds.filter(id=>id!==b.dataset.sid);
        saveData(); render();
      }
    });
  });

  // Remove product from trade
  panelContent.querySelectorAll('[data-action="del-prod"]').forEach(b=>{
    b.addEventListener('click',()=>{
      const planet = getEditingPlanet();
      if (planet?.facilities?.trade) {
        planet.facilities.trade.products=planet.facilities.trade.products.filter(x=>(x.productId||x)!==b.dataset.pid);
        saveData(); render();
      }
    });
  });

  // Toggle trend
  panelContent.querySelectorAll('[data-action="toggle-trend"]').forEach(b=>{
    b.addEventListener('click',()=>{
      const planet = getEditingPlanet();
      if (!planet?.facilities?.trade) return;
      const item = planet.facilities.trade.products.find(x=>(x.productId||x)===b.dataset.tpid);
      if (!item) return;
      // Cycle: 0→1→-1→0
      if (item.trend === 0 || item.trend === undefined) item.trend = 1;
      else if (item.trend === 1) item.trend = -1;
      else item.trend = 0;
      saveData(); render();
    });
  });

  // ---- Planet list management ----
  // Click planet to edit
  panelContent.querySelectorAll('[data-planet-id]').forEach(item=>{
    if (!state.editingPlanetId) {
      item.addEventListener('click',(e)=>{
        if (e.target.closest('.gi-del') || e.target.closest('input') || e.target.closest('button') || e.target.closest('select')) return;
        state.editingPlanetId = item.dataset.planetId;
        updatePanelContent();
      });
    }
  });

  // Delete planet
  panelContent.querySelectorAll('[data-action="del-planet"]').forEach(b=>{
    b.addEventListener('click',(ev)=>{ ev.stopPropagation();
      const node=state.selectedNodeId?getNodeById(state.selectedNodeId):null;
      if (!node) return;
      if ((node.planets||[]).length <= 1) { alert('星系至少需要一颗行星'); return; }
      node.planets = node.planets.filter(p=>p.id!==b.dataset.pid);
      if (state.editingPlanetId===b.dataset.pid) state.editingPlanetId=null;
      saveData(); render();
    });
  });

  // Add planet button
  const addPlanetBtn=panelContent.querySelector('#btn-add-planet');
  if (addPlanetBtn) addPlanetBtn.addEventListener('click',()=>{
    const node=state.selectedNodeId?getNodeById(state.selectedNodeId):null;
    if (!node||isGray(node)) return;
    const name = prompt('请输入新行星名称：');
    if (!name || !name.trim()) return;
    node.planets = node.planets || [];
    node.planets.push(defaultPlanet(name.trim()));
    saveData(); render();
  });

  // Planet name input
  const pNameInp=panelContent.querySelector('#planet-name-input');
  if (pNameInp) {
    pNameInp.addEventListener('input',()=>{
      const planet = getEditingPlanet();
      if (planet) { planet.name=pNameInp.value||'未命名'; saveData(); }
    });
  }

  // Done editing planet
  const doneBtn=panelContent.querySelector('#btn-done-planet');
  if (doneBtn) doneBtn.addEventListener('click',()=>{
    state.editingPlanetId=null;
    updatePanelContent();
    render();
  });

  // Simulate prices button
  const simBtn = panelContent.querySelector('#btn-sim-prices');
  if (simBtn) simBtn.addEventListener('click', simulateAllPrices);

  // Unblock
  panelContent.querySelectorAll('[data-action="unblock"]').forEach(function(b){
    b.addEventListener('click', function(){
      var idx = state.blockedNodeIds.indexOf(b.dataset.nid);
      if (idx >= 0) { state.blockedNodeIds.splice(idx,1); if(state.startNodeId&&state.endNodeId) computePath(); updatePathDisplay(); render(); }
    });
  });

  // ---- Map mode: waypoint & station management ----
  panelContent.querySelectorAll('[data-action="del-waypoint"]').forEach(b=>{
    b.addEventListener('click',()=>{
      state.waypointIds.splice(parseInt(b.dataset.idx),1);
      if (state.startNodeId && state.endNodeId) computePath();
      updatePathDisplay();
      render();
    });
  });
  const clearWp=panelContent.querySelector('#btn-clear-waypoints');
  if (clearWp) clearWp.addEventListener('click',()=>{
    state.waypointIds=[];
    if (state.startNodeId && state.endNodeId) computePath();
    updatePathDisplay();
    render();
    setStatus('🗺️ 途径点已清除');
  });
  const cbStation=panelContent.querySelector('#cb-station');
  if (cbStation) cbStation.addEventListener('change',()=>{
    const node = state.startNodeId ? getNodeById(state.startNodeId) : null;
    if (node && isGray(node)) { node.hasStation = cbStation.checked; saveData(); render(); }
  });
}

// ---- Facility Helpers (planet-level) ----
function getPlanetById(node, planetId) {
  if (!node || !node.planets) return null;
  return node.planets.find(p => p.id === planetId);
}

function ensurePlanetFacs(planet) {
  if (!planet.facilities) planet.facilities = defaultPlanetFacilities();
  const f=planet.facilities;
  if (!f.bar || !Array.isArray(f.bar.npcs)) f.bar={active:!!(f.bar?.active), npcs: Array.isArray(f.bar?.npcs)?f.bar.npcs:[]};
  if (f.mission===undefined) f.mission=false;
  if (!f.shipyard || !Array.isArray(f.shipyard.shipIds)) f.shipyard={active:!!(f.shipyard?.active), shipIds: Array.isArray(f.shipyard?.shipIds)?f.shipyard.shipIds:[]};
  if (f.equipment===undefined) f.equipment=false;
  if (!f.trade || !Array.isArray(f.trade.products)) f.trade={active:!!(f.trade?.active), productIds: Array.isArray(f.trade?.productIds)?f.trade.products:[]};
  if (f.fleet===undefined) f.fleet=false;
}

function setFacilityActivePlanet(planet, key, active) {
  const f=planet.facilities;
  ensurePlanetFacs(planet); // Always ensure structure first
  switch(key) {
    case 'bar': f.bar.active=active; break;
    case 'mission': f.mission=active; break;
    case 'shipyard': f.shipyard.active=active; break;
    case 'equipment': f.equipment=active; break;
    case 'trade': f.trade.active=active; break;
    case 'fleet': f.fleet=active; break;
  }
}

function selectNode(nodeId) {
  if (state.mode==='editor') {
    state.selectedNodeId = state.selectedNodeId===nodeId ? null : nodeId;
    state.editingPlanetId = null;
    state.activePanelTab='planet';
    render();
  }
}

// ---- Event Handlers ----
function onNodeMouseDown(e, nodeId) {
  if (e.button!==0) return;
  if (state.mode==='editor') {
    const node=getNodeById(nodeId); if (!node) return;
    state.dragging={nodeId, startX:e.clientX, startY:e.clientY, nodeStartX:node.x, nodeStartY:node.y, moved:false};
  } else {
    state.panning={startX:e.clientX, startY:e.clientY, viewStartX:state.viewX, viewStartY:state.viewY};
  }
  e.stopPropagation();
}

function onNodeClick(e, nodeId) {
  if (state.dragging?.moved) return;
  if (state.mode==='editor') {
    if (e.shiftKey && state.selectedNodeId && state.selectedNodeId!==nodeId) {
      createEdge(state.selectedNodeId, nodeId);
      render(); return;
    }
    state.selectedNodeId = state.selectedNodeId===nodeId ? null : nodeId;
    if (state.selectedNodeId) state.activePanelTab='planet';
    render();
  } else {
    handleMapNodeClick(nodeId, e);
    // Show detail on double-click handled separately
  }
}

// Double-click on node in map mode shows detail

  // In map mode, dblclick handled via right-click instead
  if (state.mode==='map') return;

function handleMapNodeClick(nodeId, e) {
  // View mode: just show node info
  if (state.mapSubMode === 'view') {
    state.viewNodeId = nodeId;
    updatePanelContent();
    return;
  }
  // Ctrl+Click = toggle waypoint
  if (e && (e.ctrlKey || e.metaKey)) {
    toggleWaypoint(nodeId);
    return;
  }
  // Shift+Click = toggle obstacle
  if (e && e.shiftKey) {
    var idx = state.blockedNodeIds.indexOf(nodeId);
    if (idx >= 0) { state.blockedNodeIds.splice(idx,1); setStatus('⛔ 已移除障碍: '+getNodeById(nodeId)?.name); }
    else { state.blockedNodeIds.push(nodeId); setStatus('⛔ 已标记障碍: '+getNodeById(nodeId)?.name); }
    if (state.startNodeId && state.endNodeId) computePath();
    updatePathDisplay(); render();
    return;
  }

  if (!state.startNodeId) {
    state.startNodeId=nodeId; state.endNodeId=null;
    state.pathNodeIds=[]; state.pathEdgeIds=[];
    setStatus(`🟢 起点: ${getNodeById(nodeId)?.name||'?'} — 右键查看详情，Ctrl+点击添加途径点`);
    render();
  } else if (!state.endNodeId && nodeId!==state.startNodeId) {
    state.endNodeId=nodeId; computePath();
    setStatus(`🟢 ${getNodeById(state.startNodeId)?.name||'?'} → ${getNodeById(nodeId)?.name||'?'}`);
    render(); updatePathDisplay();
  } else if (nodeId===state.startNodeId) {
    state.startNodeId=null; state.endNodeId=null;
    state.pathNodeIds=[]; state.pathEdgeIds=[];
    setStatus('🗺️ 地图模式 — 单击设起点，Ctrl+点击添加途径点'); statusPath.style.display='none';
    render();
  } else if (nodeId===state.endNodeId) {
    state.endNodeId=null; state.pathNodeIds=[]; state.pathEdgeIds=[];
    setStatus(`🟢 起点: ${getNodeById(state.startNodeId)?.name||'?'} — 单击另一星球设终点`);
    statusPath.style.display='none';
    render();
  } else {
    state.endNodeId=nodeId; computePath();
    setStatus(`🟢 ${getNodeById(state.startNodeId)?.name||'?'} → ${getNodeById(nodeId)?.name||'?'}`);
    render(); updatePathDisplay();
  }
}

function toggleWaypoint(nodeId) {
  const idx = state.waypointIds.indexOf(nodeId);
  if (idx >= 0) {
    state.waypointIds.splice(idx, 1);
    setStatus(`🔶 已移除途径点: ${getNodeById(nodeId)?.name||'?'}`);
  } else {
    state.waypointIds.push(nodeId);
    setStatus(`🔶 已添加途径点 (${state.waypointIds.length}): ${getNodeById(nodeId)?.name||'?'}`);
  }
  if (state.startNodeId && state.endNodeId) computePath();
  updatePathDisplay();
  render();
}

function toggleStation(nodeId) {
  const node = getNodeById(nodeId);
  if (!node || !isGray(node)) return;
  node.hasStation = !node.hasStation;

  setStatus(`🛰️ 空间站${node.hasStation?'已布置':'已移除'}: ${node.name}`);
  render();
}

function createEdge(fromId, toId) {
  const key=edgeKey(fromId, toId);
  if (state.edges.some(e=>edgeKey(e.from,e.to)===key)) { setStatus('⚠️ 两个星球之间已存在通道'); return; }
  state.edges.push({from:fromId, to:toId});
  saveData(); setStatus('🔗 通道已建立');
}

function addNodeAt(wx, wy) {
  const name=prompt('请输入星球/星域名称：');
  if (name===null) return;
  const trimmed=name.trim()||'未命名';
  const node={
    id:genId(), name:trimmed, colorIndex:state.selectedColorIndex,
    x:wx, y:wy,
    planets: (state.selectedColorIndex===GRAY_INDEX) ? null : [defaultPlanet(trimmed)]
  };
  state.nodes.push(node);
  saveData(); setStatus(`🪐 已添加: ${trimmed}`);
  render();
}

function deleteNode(nodeId) {
  const node=getNodeById(nodeId); if (!node) return;
  if (!confirm(`确定要删除星球「${node.name}」及其所有通道吗？`)) return;
  state.nodes=state.nodes.filter(n=>n.id!==nodeId);
  state.edges=state.edges.filter(e=>e.from!==nodeId&&e.to!==nodeId);
  if (state.selectedNodeId===nodeId) state.selectedNodeId=null;
  clearPath(); saveData();
  setStatus(`🗑 已删除: ${node.name}`);
  render();
}

function deleteShip(shipId) {
  if (!confirm('确定要删除此船只吗？已引用此船只的船坞将自动移除该船只。')) return;
  state.ships=state.ships.filter(s=>s.id!==shipId);
  // Clean up references
  for (const node of state.nodes) {
    for (const p of getPlanets(node)) {
      if (p.facilities?.shipyard?.shipIds) {
        p.facilities.shipyard.shipIds=p.facilities.shipyard.shipIds.filter(id=>id!==shipId);
      }
    }
  }
  if (state.shipEditId===shipId) state.shipEditId=null;
  saveData(); updatePanelContent(); render();
}

function deleteProduct(prodId) {
  if (!confirm('确定要删除此产品吗？已引用此产品的贸易中心将自动移除该产品。')) return;
  state.products=state.products.filter(p=>p.id!==prodId);
  for (const node of state.nodes) {
    for (const p of getPlanets(node)) {
      if (p.facilities?.trade?.productIds) {
        p.facilities.trade.products=p.facilities.trade.products.filter(id=>id!==prodId);
      }
    }
  }
  if (state.productEditId===prodId) state.productEditId=null;
  saveData(); updatePanelContent(); render();
}

function deleteEdgeByKey(key) {
  state.edges=state.edges.filter(e=>edgeKey(e.from,e.to)!==key);
  saveData(); setStatus('🗑 通道已删除');
  if (state.startNodeId&&state.endNodeId) computePath();

}

// Fuzzy match score (lower = better)
function fuzzyScore(query, target) {
  const q = query.toLowerCase().trim();
  const t = target.toLowerCase();
  if (!q) return 0;
  if (t === q) return -3;              // exact match
  if (t.startsWith(q)) return -2;      // starts with
  if (t.includes(q)) return -1;        // contains
  // Check character-by-character match
  let qi = 0, dist = 0, firstMatch = -1;
  for (let i = 0; i < t.length && qi < q.length; i++) {
    if (t[i] === q[qi]) { if (firstMatch < 0) firstMatch = i; qi++; }
    else dist++;
  }
  if (qi === q.length) return dist + firstMatch * 0.1; // all chars matched with gaps
  return 999; // no match
}

function searchNodes(query, onlyPlanets=false) {
  const results = [];
  for (const node of state.nodes) {
    if (onlyPlanets && isGray(node)) continue;
    const score = fuzzyScore(query, node.name);
    if (score < 999) results.push({ node, score });
  }
  results.sort((a,b) => a.score - b.score);
  return results.slice(0, 15); // top 15
}

function searchResource(query) {
  const q = query.toLowerCase().trim();
  if (!q) return [];
  const results = [];
  for (const node of state.nodes) {
    if (isGray(node)) continue;
    const reasons = [];
    for (const planet of getPlanets(node)) {
      const f = planet.facilities; if (!f) continue;
      if (f.bar?.active) {
        for (const npc of f.bar.npcs||[]) {
          if (npc.name.toLowerCase().includes(q) || npc.role.toLowerCase().includes(q))
            reasons.push('🪐'+planet.name+' 🍺 '+npc.name);
        }
        if ('酒吧bar'.includes(q)) reasons.push('🪐'+planet.name+' 🍺 酒吧');
      }
      if (f.mission && '任务mission'.includes(q)) reasons.push('🪐'+planet.name+' 📋 任务中心');
      if (f.shipyard?.active) {
        for (const sid of f.shipyard.shipIds||[]) {
          const ship = getShipById(sid);
          if (ship && (ship.name.toLowerCase().includes(q) || (ship.type||'').toLowerCase().includes(q)))
            reasons.push('🪐'+planet.name+' 🚀 '+ship.name);
        }
        if ('船坞shipyard'.includes(q)) reasons.push('🪐'+planet.name+' 🚀 船坞');
      }
      if (f.equipment && '装备equipment'.includes(q)) reasons.push('🪐'+planet.name+' 🔧 装备中心');
      if (f.trade?.active) {
        for (const item of f.trade.products||[]) {
          const pid = item.productId || item; const prod = getProductById(pid);
          if (prod && prod.name.toLowerCase().includes(q)) reasons.push('🪐'+planet.name+' 💰 '+prod.icon+prod.name);
        }
        if ('贸易trade'.includes(q)) reasons.push('🪐'+planet.name+' 💰 贸易中心');
      }
      if (f.fleet && '舰队fleet'.includes(q)) reasons.push('🪐'+planet.name+' 🏛️ 舰队管理');
    }
    if (reasons.length > 0) results.push({ node, reasons });
  }
  return results;
}

function findNearestResource(nodeId, query) {
  // BFS from nodeId to find nearest node with the resource
  const targetNodes = searchResource(query).map(r => r.node.id);
  if (targetNodes.length === 0) return [];
  if (targetNodes.includes(nodeId)) {
    const node = getNodeById(nodeId);
    return node ? [{ node, reasons: ['📍 当前星球'] }] : [];
  }
  // BFS
  const queue = [nodeId];
  const visited = new Set([nodeId]);
  const parent = {};
  let found = false;
  while (queue.length > 0 && !found) {
    const cur = queue.shift();
    for (const nb of getNeighbors(cur)) {
      if (!visited.has(nb)) {
        visited.add(nb);
        parent[nb] = cur;
        queue.push(nb);
      }
    }
  }
  // Find all target nodes and compute distance
  const distResults = [];
  for (const tid of targetNodes) {
    if (tid === nodeId) { distResults.push({ node: getNodeById(nodeId), dist: 0, reasons: ['📍 当前星球'] }); continue; }
    // Reconstruct path
    const path = [];
    let cur = tid;
    while (cur !== undefined && cur !== nodeId) {
      path.unshift(cur);
      cur = parent[cur];
    }
    if (cur === nodeId) distResults.push({ node: getNodeById(tid), dist: path.length, reasons: [] });
  }
  distResults.sort((a,b) => a.dist - b.dist);
  if (distResults.length === 0) return [];
  const minDist = distResults[0].dist;
  return distResults.filter(r => r.dist === minDist);
}

function doSystemSearch(query) {
  const results = searchNodes(query, false);
  if (results.length === 0) { state.highlightedNodeIds = []; return '<div id="search-no-results">未找到匹配的星系</div>'; }
  return results.map((r,i) => renderNodeResult(r.node, i, `🌌 ${FACTION_COLORS[r.node.colorIndex].name}`)).join('');
}

function doPlanetSearch(query) {
  const q = query.toLowerCase().trim();
  const results = [];
  for (const node of state.nodes) {
    if (isGray(node)) continue;
    let bestScore = 999, bestMatch = '';
    const ns = fuzzyScore(q, node.name);
    if (ns < bestScore) { bestScore = ns; bestMatch = node.name; }
    for (const planet of getPlanets(node)) {
      const ps = fuzzyScore(q, planet.name);
      if (ps < bestScore) { bestScore = ps; bestMatch = `🪐 ${planet.name}`; }
    }
    if (bestScore < 999) {
      results.push({ node, score: bestScore, match: bestMatch });
    }
  }
  results.sort((a,b) => a.score - b.score);
  if (results.length === 0) { state.highlightedNodeIds = []; return '<div id="search-no-results">未找到匹配的星球（已排除灰色星域）</div>'; }
  return results.map((r,i) => renderNodeResult(r.node, i, `${escapeHtml(r.match)} · ${FACTION_COLORS[r.node.colorIndex].name}`)).join('');
}

function enrichResourceResults(results) {
  for (const r of results) {
    let min = Infinity, max = 0;
    for (const p of getPlanets(r.node)) {
      const t = p.facilities && p.facilities.trade;
      if (!t || !t.active) continue;
      for (const item of (t.products||[])) {
        var pm = item.priceMin || item.price || 0;
        var px = item.priceMax || item.price || 0;
        if (pm > 0 && pm < min) min = pm;
        if (px > max) max = px;
      }
    }
    r._pi = min < Infinity ? ' 💰'+min.toLocaleString()+'-'+max.toLocaleString() : '';
  }
}
function sortResourceResults(results) {
  var sel = document.getElementById('res-sort');
  if (!sel || !sel.value) return;
  if (sel.value === 'price_asc') {
    results.sort(function(a,b){ return getMinPrice(a.node) - getMinPrice(b.node); });
  } else if (sel.value === 'price_desc') {
    results.sort(function(a,b){ return getMinPrice(b.node) - getMinPrice(a.node); });
  }
}
function getMinPrice(node) {
  var min = Infinity;
  for (var i = 0; i < getPlanets(node).length; i++) {
    var p = getPlanets(node)[i];
    var t = p.facilities && p.facilities.trade;
    if (!t || !t.active) continue;
    for (var j = 0; j < (t.products||[]).length; j++) {
      var pm = t.products[j].priceMin || t.products[j].price || 0;
      if (pm > 0 && pm < min) min = pm;
    }
  }
  return min === Infinity ? 0 : min;
}

function doResourceHighlightSearch(query) {
  const results = searchResource(query);
  if (results.length === 0) { state.highlightedNodeIds = []; return '<div id="search-no-results">未找到匹配的资源</div>'; }
  enrichResourceResults(results);
  sortResourceResults(results);
  highlightResourceNodes(results.map(r => r.node.id));
  return results.map((r,i) => renderNodeResult(r.node, i, '📦 '+r.reasons.join(' · ')+(r._pi||''))).join('');
}

function doResourceNearestSearch(query) {
  const refId = state.selectedNodeId || state.startNodeId;
  if (!refId) { state.highlightedNodeIds = []; return '<div id="search-no-results">请先在画布上选中一个参考星球</div>'; }
  let results = findNearestResource(refId, query);
  results = results.filter(r => r.node.id !== refId || r.dist !== 0);
  if (results.length === 0) { state.highlightedNodeIds = []; return '<div id="search-no-results">未找到其他拥有该资源的星球</div>'; }
  enrichResourceResults(results);
  sortResourceResults(results);
  highlightResourceNodes(results.map(r => r.node.id));
  return results.map((r,i) => {
    const distStr = r.dist === 0 ? '当前星球' : `距离: ${r.dist} 跳`;
    return renderNodeResult(r.node, i, '📍 '+distStr+(r.reasons.length?' · '+r.reasons.join(' · '):'')+(r._pi||''));
  }).join('');
}

function doNPCSearch(query) {
  const q = query.toLowerCase().trim();
  const results = [];
  const seen = new Set();
  for (const node of state.nodes) {
    if (isGray(node)) continue;
    let bestScore = 999, bestMatch = '';
    for (const planet of getPlanets(node)) {
      if (planet.facilities?.bar?.active) {
        for (const npc of (planet.facilities.bar.npcs||[])) {
          const ns = fuzzyScore(q, npc.name);
          if (ns < bestScore) { bestScore = ns; bestMatch = `${npc.name} (${npc.role}) · 🪐 ${planet.name}`; }
        }
      }
    }
    if (bestScore < 999) {
      results.push({ node, score: bestScore, match: bestMatch });
    }
  }
  results.sort((a,b) => a.score - b.score);
  if (results.length === 0) { state.highlightedNodeIds = []; return '<div id="search-no-results">未找到匹配的NPC</div>'; }
  return results.map((r,i) => renderNodeResult(r.node, i, `👤 ${escapeHtml(r.match)} · ${FACTION_COLORS[r.node.colorIndex].name}`)).join('');
}

function renderSearchResults(query) {
  if (!query.trim()) { state.highlightedNodeIds = []; return '<div id="search-no-results">输入关键词开始搜索</div>'; }
  if (searchTab === 'system')   return doSystemSearch(query);
  if (searchTab === 'planet')   return doPlanetSearch(query);
  if (searchTab === 'npc')      return doNPCSearch(query);
  if (searchTab === 'resource') return resourceMode==='highlight' ? doResourceHighlightSearch(query) : doResourceNearestSearch(query);
  return '';
}

function switchMode(mode) {
  state.mode=mode; state.selectedNodeId=null; state.editingPlanetId=null; clearPath();
  state.highlightedNodeIds = []; state.viewNodeId=null;
  document.getElementById('btn-editor').classList.toggle('active',mode==='editor');
  document.getElementById('btn-map').classList.toggle('active',mode==='map');
  if (mode==='map') { canvasWrap.classList.add('map-mode'); setStatus('🗺️ 地图模式 — 单击设起终点，右键查看详情'); }
  else { canvasWrap.classList.remove('map-mode'); setStatus('✏️ 编辑器模式 — 双击画布添加星球'); }
  statusPath.style.display='none';
  state.activePanelTab='planet'; state.shipEditId=null; state.productEditId=null;
  render();
}

function autoFitView() {
  if (state.nodes.length===0) { state.viewX=0; state.viewY=0; state.scale=1; return; }
  const r=svgRoot.getBoundingClientRect();
  if (r.width===0||r.height===0) return;
  let x1=Infinity,y1=Infinity,x2=-Infinity,y2=-Infinity;
  for (const n of state.nodes) { if(n.x<x1)x1=n.x; if(n.y<y1)y1=n.y; if(n.x>x2)x2=n.x; if(n.y>y2)y2=n.y; }
  const pad=80, bw=x2-x1+pad*2, bh=y2-y1+pad*2;
  state.scale=Math.min(r.width/bw,r.height/bh,2);
  state.viewX=(r.width-(x1+x2)*state.scale)/2;
  state.viewY=(r.height-(y1+y2)*state.scale)/2;
}

function api_findPath(nameA, nameB, mode, waypointNames, blockedNames) {
  mode = mode || 'shortest';
  var nA = fuzzyFindNode(nameA), nB = fuzzyFindNode(nameB);
  if (!nA || !nB) return null;
  var oldBlocked = state.blockedNodeIds.slice();
  // 临时设置障碍
  if (blockedNames && blockedNames.length) {
    for (var b = 0; b < blockedNames.length; b++) {
      var bn = fuzzyFindNode(blockedNames[b]);
      if (bn && bn.id !== nA.id && bn.id !== nB.id) state.blockedNodeIds.push(bn.id);
    }
  }
  var oldMode = state.pathMode;
  state.pathMode = mode;
  // Resolve waypoints
  var wpIds = [];
  if (waypointNames && waypointNames.length) {
    for (var w = 0; w < waypointNames.length; w++) {
      var wn = fuzzyFindNode(waypointNames[w]);
      if (wn) wpIds.push(wn.id);
    }
  }
  // Chain path: start → waypoints → end
  var order = [nA.id].concat(wpIds).concat([nB.id]);
  var fullPath = [];
  for (var i = 0; i < order.length - 1; i++) {
    var seg = bfs(order[i], order[i+1]);
    if (!seg) { state.pathMode = oldMode; return null; }
    if (i > 0) seg.shift();
    fullPath = fullPath.concat(seg);
  }
  state.pathMode = oldMode;
  state.blockedNodeIds = oldBlocked; // 恢复
  var names = fullPath.map(function(id){ var n=getNodeById(id); return n?n.name:'?'; });
  var dist = fullPath.length - 1;
  var maxStreak = 0, cur = 0;
  for (var i = 0; i < fullPath.length; i++) {
    if (i === 0) continue;
    var nd = getNodeById(fullPath[i]);
    if (nd && (nd.colorIndex===0||nd.colorIndex===2)) cur = 0;
    else { cur++; maxStreak = Math.max(maxStreak, cur); }
  }
  return { path: names.join(' → '), distance: dist, maxNoRefuel: maxStreak, nodeIds: fullPath, waypointIds: wpIds };
}

function fuzzyFindNode(name) {
  if (!name) return null;
  var q = name.toLowerCase().trim();
  var best = null, bestScore = 999;
  for (var i = 0; i < state.nodes.length; i++) {
    var n = state.nodes[i];
    var s = _fz(q, n.name.toLowerCase());
    if (s < bestScore) { bestScore = s; best = n; }
    var planets = n.planets || [];
    for (var j = 0; j < planets.length; j++) {
      s = _fz(q, planets[j].name.toLowerCase());
      if (s < bestScore) { bestScore = s; best = n; }
    }
  }
  return bestScore < 100 ? best : null;
}
function _fz(q, t) { if (!q||!t) return 999; if (q===t) return -3; if (t.indexOf(q)===0) return -2; if (t.indexOf(q)>=0) return -1; return 999; }

function api_searchNPC(name) {
  var q = name.toLowerCase().trim(), results = [];
  for (var i = 0; i < state.nodes.length; i++) {
    var n = state.nodes[i]; if (isGray(n)) continue;
    var planets = n.planets || [];
    for (var j = 0; j < planets.length; j++) {
      var p = planets[j]; var bar = (p.facilities||{}).bar;
      if (!bar || !bar.active) continue;
      for (var k = 0; k < (bar.npcs||[]).length; k++) {
        var npc = bar.npcs[k];
        if (_fz(q, npc.name.toLowerCase()) < 100 || _fz(q, npc.role.toLowerCase()) < 100) {
          results.push({ npc: npc, planet: p.name, system: n.name, systemId: n.id });
        }
      }
    }
  }
  return results;
}

function api_searchProduct(name) {
  var q = name.toLowerCase().trim(), results = [];
  for (var i = 0; i < state.nodes.length; i++) {
    var n = state.nodes[i]; if (isGray(n)) continue;
    var planets = n.planets || [];
    for (var j = 0; j < planets.length; j++) {
      var p = planets[j]; var trade = (p.facilities||{}).trade;
      if (!trade || !trade.active) continue;
      for (var k = 0; k < (trade.products||[]).length; k++) {
        var item = trade.products[k]; var pid = item.productId || item;
        var prod = getProductById(pid);
        if (prod && prod.name.toLowerCase().indexOf(q) >= 0) {
          results.push({ product: prod, priceMin: item.priceMin||0, priceMax: item.priceMax||0, trend: item.trend||0, planet: p.name, system: n.name, systemId: n.id });
        }
      }
    }
  }
  results.sort(function(a,b){ return (a.priceMin||0) - (b.priceMin||0); });
  return results;
}
