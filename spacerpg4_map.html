// Pre-compute answers for user question
function precomputeForQuestion(msg) {
  var pre = '';
  var q = msg.toLowerCase();
  // Detect path queries: "从X到Y" "X到Y怎么走" "X去Y"
  var pathMatch = msg.match(/从\s*(\S+?)\s*到\s*(\S+?)(?:怎么|如何|的路|的路径|走|的走|$|\s|\?|？)/) || msg.match(/(\S+?)\s*到\s*(\S+?)\s*(?:怎么|如何|最|的|走|路径)/);
  if (pathMatch && pathMatch[2]) {
    // Clean up trailing text from second capture
    pathMatch[2] = pathMatch[2].replace(/[怎么走路径的路线呢吗啊呀？?！!.。，,]+$/g, '').trim();
  }
  if (pathMatch) {
    var a = pathMatch[1], b = pathMatch[2];
    var path = api_findPath(a, b, 'shortest');
    if (path) {
      pre += '预计算路径('+a+'→'+b+'): '+path.path+' | 距离:'+path.distance+'跳 | 最长无补给段:'+path.maxNoRefuel+'跳\n';
      var nopath = api_findPath(a, b, 'norefuel');
      if (nopath) pre += '无补给路径: '+nopath.path+' | 距离:'+nopath.distance+'跳\n';
      else pre += '无补给路径: 未计算(需FTL参数)\n';
    }
  }
  // Detect shipyard query: "X有什么船" "X的舰船" "X船坞"
  var shipMatch = msg.match(/(\S+?)(?:有什么|有哪些|的|有).*(?:船|舰|舰船|船坞)/);
  if (shipMatch) {
    var sysName = shipMatch[1];
    var snode = fuzzyFindNode(sysName);
    if (snode) {
      pre += '预计算船坞查询('+sysName+'→'+snode.name+'): ';
      var hasShipyard = false;
      for (var si = 0; si < (snode.planets||[]).length; si++) {
        var sp = snode.planets[si];
        var sy = (sp.facilities||{}).shipyard;
        if (sy && sy.active) {
          hasShipyard = true;
          var ships = (sy.shipIds||[]).map(function(sid){ var s = getShipById(sid); return s?s.name+'('+(s.type||'')+' 💰'+(s.price||0)+')':'?'; }).join(',');
          pre += '有船坞: '+ships+'; ';
        }
      }
      if (!hasShipyard) pre += '无船坞; ';
      pre += '\n';
    }
  }

  // Detect NPC search
  var npcMatch = msg.match(/找\s*(\S+)/) || msg.match(/(\S+)\s*在哪里/) || msg.match(/NPC.*?(\S+)/i);
  if (npcMatch) {
    var npcName = npcMatch[1];
    var npcs = api_searchNPC(npcName);
    if (npcs.length > 0) {
      pre += '预计算NPC查找('+npcName+'): ';
      for (var i = 0; i < npcs.length; i++) {
        pre += npcs[i].npc.name+'('+npcMatch[i]?.npc?.role+') 在 '+npcs[i].system+'/'+npcs[i].planet+'; ';
      }
      pre += '\n';
    } else { pre += '未找到NPC: '+npcName+'\n'; }
  }
  // Detect product search
  var prodMatch = msg.match(/(?:哪里|在哪|找)\s*.*?(?:买|卖|有)\s*(\S+)/) || msg.match(/(\S+)\s*(?:价格|多少钱)/);
  if (prodMatch) {
    var prodName = prodMatch[1];
    var prods = api_searchProduct(prodName);
    if (prods.length > 0) {
      pre += '预计算产品('+prodName+'): ';
      for (var i = 0; i < Math.min(prods.length, 8); i++) {
        var tr = prods[i].trend||0, trIcon = tr===1?'🔴':tr===-1?'🟢':'—';
        pre += prods[i].system+'/'+prods[i].planet+' 💰'+prods[i].priceMin+'-'+prods[i].priceMax+' '+trIcon+'; ';
      }
      pre += '\n';
    } else { pre += '未找到产品: '+prodName+'\n'; }
  }
  return pre;
}

function api_findNearestShip(shipName, fromName) {
  var q = shipName.toLowerCase().trim();
  var targets = [];
  for (var i = 0; i < state.nodes.length; i++) {
    var n = state.nodes[i]; if (isGray(n)) continue;
    for (var j = 0; j < (n.planets||[]).length; j++) {
      var sy = (n.planets[j].facilities||{}).shipyard;
      if (!sy || !sy.active) continue;
      for (var k = 0; k < (sy.shipIds||[]).length; k++) {
        var s = getShipById(sy.shipIds[k]);
        if (s && s.name.toLowerCase().indexOf(q) >= 0) {
          targets.push({ systemId: n.id, systemName: n.name, planetName: n.planets[j].name, ship: s });
          break;
        }
      }
    }
  }
  if (targets.length === 0 || !fromName) return targets;
  var fromNode = fuzzyFindNode(fromName);
  if (!fromNode) return targets;
  // Find nearest target by BFS distance
  for (var t = 0; t < targets.length; t++) {
    var path = bfs(fromNode.id, targets[t].systemId);
    targets[t].distance = path ? path.length - 1 : 999;
  }
  targets.sort(function(a,b){ return a.distance - b.distance; });
  return targets;
}

function executeAPICall(fnName, args) {
  try {
    var a = JSON.parse(args);
    if (fnName === 'findPath') {
      var result = api_findPath(a.from, a.to, a.mode||'shortest', a.waypoints, a.blocked);
      // 将AI指定的障碍星系标记到地图上
      if (a.blocked && a.blocked.length) {
        for (var bi = 0; bi < a.blocked.length; bi++) {
          var bnode = fuzzyFindNode(a.blocked[bi]);
          if (bnode && !state.blockedNodeIds.includes(bnode.id)) state.blockedNodeIds.push(bnode.id);
        }
      }
      if (result && result.nodeIds && result.nodeIds.length > 0) {
        state.startNodeId = result.nodeIds[0];
        state.endNodeId = result.nodeIds[result.nodeIds.length - 1];
        state.pathNodeIds = result.nodeIds;
        state.pathEdgeIds = [];
        for (var pi = 0; pi < result.nodeIds.length - 1; pi++) {
          state.pathEdgeIds.push(edgeKey(result.nodeIds[pi], result.nodeIds[pi+1]));
        }
        // 设置途径点
        state.waypointIds = result.waypointIds || [];
        if (state.mode !== 'map') { state.mode = 'map'; state.mapSubMode = 'nav'; }
        render();
        updatePathDisplay();
      }
      return JSON.stringify(result);
    }
    if (fnName === 'searchNPC') return JSON.stringify(api_searchNPC(a.name));
    if (fnName === 'searchProduct') return JSON.stringify(api_searchProduct(a.name));
    if (fnName === 'findNearestShip') return JSON.stringify(api_findNearestShip(a.shipName, a.from));
    if (fnName === 'getSystemInfo') {
      var node = fuzzyFindNode(a.name); if (!node) return 'null';
      var planets = (node.planets||[]).map(function(p){var f=p.facilities||{};return {name:p.name,facilities:f};});
      return JSON.stringify({id:node.id,name:node.name,faction:node.faction,colorIndex:node.colorIndex,planets:planets});
    }
    return '{"error":"unknown function"}';
  } catch(e) { return '{"error":"'+e.message+'"}'; }
}

async function sendChat() {
  var input = document.getElementById("chat-input");
  var msg = input.value.trim();
  if (!msg) return;
  // 每次发送前重新加载配置（支持热更新）
  _kbConfig = loadKBConfig();

  if (!key) { addChatMessage('⚠️ 请先在 kb_config.html 中配置 API Key，然后刷新本页面。', 'ai'); return; }
  input.value = "";
  addChatMessage(msg, "user");
  document.getElementById("chat-loading").style.display = "block";
  try {
    var sp = buildSystemPrompt() + "\n\n## 函数调用协议\n"+
      "如果你需要精确数据，使用以下格式调用函数：\n"+
      "[CALL:findPath]{\"from\":\"起点\",\"to\":\"终点\",\"mode\":\"shortest|norefuel\",\"waypoints\":[\"途经1\"]}\n"+
      "[CALL:searchNPC]{\"name\":\"NPC名\"}\n"+
      "[CALL:searchProduct]{\"name\":\"产品名\"}\n"+

      "调用后系统返回JSON结果，你再基于真实数据回答。不要在无数据时编造！\n"+
      "用户提到避开/绕过/不经过某星系时必须在findPath中用blocked参数！用户提到途径/经过某地时用waypoints参数！注意：[CALL:xxx]必须单独一行。不要自己判断路径是否可能，直接调用API！";
    var r1 = await fetch(DEEPSEEK_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json","Authorization":"Bearer "+key},
      body: JSON.stringify({model:"deepseek-chat",messages:[{role:"system",content:sp},{role:"user",content:msg}],max_tokens:500,temperature:0})
    });
    var reply1 = (await r1.json()).choices[0].message.content;
    var callRe = /\[CALL:(\w+)\]\s*(\{[^}]+\})/g;
    var fnResults = "";
    var m;
    while ((m = callRe.exec(reply1)) !== null) {
      fnResults += "\n函数"+m[1]+"("+m[2]+")返回:\n" + executeAPICall(m[1], m[2]) + "\n";
    }
    var userMsg2 = fnResults ? (msg + "\n\n[系统注入-函数调用结果]" + fnResults + "\n请基于以上真实数据回答。") : msg;
    var r2 = await fetch(DEEPSEEK_URL, {
      method: "POST",
      headers: {"Content-Type":"application/json","Authorization":"Bearer "+key},
      body: JSON.stringify({model:"deepseek-chat",messages:[{role:"system",content:sp},{role:"user",content:userMsg2}],max_tokens:1500,temperature:0.3})
    });
    var reply2 = (await r2.json()).choices[0].message.content;
    var finalReply = fnResults ? reply2 : reply1;
    addChatMessage(finalReply, "ai");
    chatHistory.push({role:"user",content:msg});
    chatHistory.push({role:"assistant",content:finalReply});
  } catch(e) {
    addChatMessage("连接失败: "+e.message, "ai");
  }
  document.getElementById("chat-loading").style.display = "none";
}

function renderMarkdown(text) {
  // Escape HTML first
  var html = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // Code blocks ```
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code `
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold ** or __
  html = html.replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>');
  html = html.replace(/__([^_]+)__/g, '<b>$1</b>');
  // Italic * or _
  html = html.replace(/\*([^*]+)\*/g, '<i>$1</i>');
  html = html.replace(/_([^_]+)_/g, '<i>$1</i>');
  // Headers ###
  html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  // Unordered lists
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
  // Ordered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Horizontal rule
  html = html.replace(/^---+$/gm, '<hr>');
  // Line breaks
  html = html.replace(/\n\n/g, '<br><br>');
  html = html.replace(/\n/g, '<br>');
  return html;
}

function addChatMessage(text, role) {
  var container = document.getElementById('chat-messages');
  var div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  div.innerHTML = role === 'ai' ? renderMarkdown(text) : text.replace(/\n/g,'<br>');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

});
document.getElementById('news-log').innerHTML = '<div style="color:#ff8800;font-size:11px;">📰 新闻日志 (点击展开)</div>';
function renderNewsLog() {
  if (_newsCollapsed) return;
  const log = document.getElementById('news-log');
  let html = '';
  for (const e of _newsEntries) {
    html += `<div class="news-entry"><span class="ne-time">${e.time||''}</span>`;
    for (const u of (e.updates||[])) {
      html += `<div><span class="ne-system">${u.system}</span></div>`;
      for (const item of (u.items||[])) {
        html += `<div class="ne-items" style="padding-left:8px;">${item}</div>`;
      }
    }
    html += '</div>';
  }
  log.innerHTML = html || '<div style="color:#888;font-size:10px;">等待新闻更新...</div>';
}
setInterval(async ()=>{
  try {
    const r = await fetch(OCR_URL+'/news.json');
    const news = await r.json();
    if (news.time && news.time !== _lastNewsTime) {
      // 首次轮询只记时间，不回放旧新闻
      if (_lastNewsTime === '__first__') { _lastNewsTime = news.time; return; }
      _lastNewsTime = news.time;
      _newsEntries.unshift(news);
      if (_newsEntries.length > 5) _newsEntries.length = 5;
      renderNewsLog();

      } catch(e2){}

// ============================================================
// SpaceRPG4 Price Trend API
// ============================================================
// 外部AI/脚本可通过以下接口调整星系物价趋势
//   spacerpgAPI.setTrend(systemId, planetId, productId, trend, price?)
//     trend: -1=跌🟢  0=平—  1=涨🔴
//   spacerpgAPI.setTrends([{systemId,planetId,productId,trend,price},...])
//   spacerpgAPI.getTrends(systemId, planetId?)
//   spacerpgAPI.refresh()
window.spacerpgAPI = {
  setTrend(systemId, planetId, productId, trend, price) {
    const node = getNodeById(systemId);
    if (!node) return { error: '星系不存在: '+systemId };
    const planet = getPlanetById(node, planetId);
    if (!planet) return { error: '行星不存在: '+planetId };
    if (!planet.facilities?.trade?.products) return { error: '该行星无贸易中心' };
    const item = planet.facilities.trade.products.find(x => (x.productId||x) === productId);
    if (!item) return { error: '产品不在该行星贸易列表中: '+productId };
    item.trend = trend;
    if (price !== undefined) { item.priceMin = price; item.priceMax = price; }
    saveData();
    return { success: true };
  },
  setTrends(updates) {
    let updated = 0;
    for (const u of updates) { const r = this.setTrend(u.systemId, u.planetId, u.productId, u.trend, u.price); if (r.success) updated++; }
    saveData();
    return { success: true, updated };
  },
  getTrends(systemId, planetId) {
    const node = getNodeById(systemId);
    if (!node) return [];
    const planets = planetId ? [getPlanetById(node, planetId)].filter(Boolean) : getPlanets(node);
    const results = [];
    for (const p of planets) {
      if (!p.facilities?.trade?.products) continue;
      for (const item of p.facilities.trade.products) {
        const pid = item.productId || item; const prod = getProductById(pid);
        results.push({ productId:pid, productName:prod?.name||'?', price:item.price||0, trend:item.trend||0, planetId:p.id, planetName:p.name });
      }
    }
    return results;
  },
  refresh() { render(); }
};
